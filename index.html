                   <div style="font-family: 'Noto Serif Thai', sans-serif; width: 143mm; margin: 0 auto; box-sizing: border-box; background: #fff; padding: 3px;">
    <h1 style="text-align: center; color: #166534; font-size: 12px; margin: 2px 0;">ใบเสร็จรับเงิน</h1>
    
    <div style="display: flex; justify-content: space-between; margin: 2px 0; font-size: 10px;">
        <div>
            <p style="margin: 1px 0;">ร้าน รุ่งฟ้าแอร์</p>
            <p style="margin: 1px 0;">141 ม.4 ต.บ้านกลาง อ.เมือง จ.ปทุมธานี</p>
            <p style="margin: 1px 0;">โทร: 085-168-9671</p>
            
            <p style="margin: 1px 0;">ลูกค้า: ${billData.customer || 'ไม่ระบุ'}</p>
            ${billData.customerDetails ? `<p style="margin: 1px 0;">ข้อมูลลูกค้า: ${billData.customerDetails}</p>` : ''}
        </div>
        <div style="text-align: right; font-size: 10px;">
            <p style="margin: 1px 0;">วันที่: ${formatDate(billData.date)}</p>
            <p style="margin: 1px 0;">เลขที่: ${billData.id}</p>
        </div>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin: 2px 0; font-size: 10px;">
        <thead>
            <tr style="background-color: #166534; color: white;">
                <th style="padding: 2px; text-align: center; border: 0.5px solid #333;">ลำดับ</th>
                <th style="padding: 2px; text-align: left; border: 0.5px solid #333;">รายการ</th>
                <th style="padding: 2px; text-align: right; border: 0.5px solid #333;">ราคา</th>
                <th style="padding: 2px; text-align: center; border: 0.5px solid #333;">จำนวน</th>
                <th style="padding: 2px; text-align: right; border: 0.5px solid #333;">รวม</th>
            </tr>
        </thead>
        <tbody>
                              ${billData.items.map((item, i) => `
                                    <tr style="border-bottom: 0.5px solid #ddd;">
                                        <td style="padding: 2px; text-align: center; border: 0.5px solid #ddd;">${i + 1}</td>
                                        <td style="padding: 2px; text-align: left; border: 0.5px solid #ddd;">${item.name}</td>
                                        <td style="padding: 2px; text-align: right; border: 0.5px solid #ddd;">${formatCurrency(item.price)}</td>
                                        <td style="padding: 2px; text-align: center; border: 0.5px solid #ddd;">${item.qty}</td>
                                        <td style="padding: 2px; text-align: right; border: 0.5px solid #ddd;">${formatCurrency(item.price * item.qty)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
        
                        <div style="margin-top: 4px; font-size: 10px; display: flex; flex-direction: column; align-items: flex-end;">
                  <div style="width: 200px; display: flex; justify-content: space-between;">
                      <span>ยอดรวมสินค้า:</span>
                      <span>${formatCurrency(totalBeforeDiscount)}</span>
                  </div>
                  
                  ${totalDiscount > 0 ? `
                  <div style="width: 200px; display: flex; justify-content: space-between; color: #b91c1c;">
                      <span>ส่วนลดรวม:</span>
                      <span>-${formatCurrency(totalDiscount)}</span>
                  </div>
                  ` : ''}

                  <div style="width: 200px; display: flex; justify-content: space-between; font-weight: bold; font-size: 11px; border-top: 1px solid #333; margin-top: 2px; padding-top: 2px;">
                      <span>ยอดจ่ายสุทธิ:</span>
                      <span>${formatCurrency(billData.totalSale)}</span>
                  </div>
              </div>
        
                        <div style="text-align: right; margin-top: px; font-size: 10px;">
                            <p style="margin: 8px 0;">........................</p>
                        </div>

                        <div style="text-align: right; margin-top: 1px; font-size: 10px; padding-right: 13px">
                            <p style="margin: 1px 0;">ผู้รับเงิน</p>
                        </div>
        
                        <div style="text-align: center; margin-top: 2px; font-size: 10px;">
                            <p>ขอบคุณที่ใช้บริการ</p>
                        </div>
                    </div>
                `;

          // ตั้งค่า options สำหรับ html2pdf
          const opt = {
            margin: 1,
            filename: `bill_${billData.id}_${new Date().toISOString().slice(0, 10)}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: {
              scale: 3,
              useCORS: true,
              scrollY: 0, // แก้ปัญหาเว้นที่ว่างด้านบน ถ้าหน้าจอมีการเลื่อนอยู่
            },
            // Custom page size: 210mm (width) x 148.5mm (height)
            jsPDF: { unit: 'mm', format: 'a5', orientation: 'portrait' }
          };

          // สร้าง PDF
          html2pdf().from(content).set(opt).save();

        } catch (error) {
          console.error("PDF generation error:", error);
          setPopupContent({
            title: "ข้อผิดพลาด",
            message: "เกิดข้อผิดพลาดในการสร้างไฟล์ PDF"
          });
          setShowPopup(true);
        }
      };

      const BillDetailView = () => {
        const bill = bills.find(b => b.id === currentBillId);

        if (!bill) {
          return (
            <div className="p-6 text-center bg-white rounded-xl shadow-lg m-6">
              <p className="text-red-500">ไม่พบบิลที่ระบุ</p>
              <button onClick={() => navigateTo('dashboard')} className="mt-4 text-green-600 hover:underline">กลับหน้าหลัก</button>
            </div>
          );
        }

        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title={`รายละเอียดบิล #${bill.id}`} />

            <div className="max-w-3xl mx-auto mt-6">
              {/* Bill Info Card */}
              <div className="bg-white p-6 rounded-xl shadow-xl border-t-4 border-green-500">
                <div className="flex justify-between items-start mb-4 border-b pb-4">
                  <div>
                    <h2 className="text-3xl font-black text-green-700">บิลเลขที่ #{bill.id}</h2>
                    <p className="text-sm text-gray-500 mt-1">วันที่ทำรายการ: {formatDate(bill.date)}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-lg font-semibold text-gray-700">ลูกค้า/ช่าง</p>
                    <p className="text-xl font-bold text-green-600">{bill.customer || 'ไม่ระบุ'}</p>
                  </div>
                </div>

                {/* Items Table */}
                <div className="overflow-x-auto mb-6">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-green-50">
                      <tr>
                        <th className="px-3 py-2 text-left text-xs font-bold text-green-700 uppercase">สินค้า</th>
                        <th className="px-3 py-2 text-right text-xs font-bold text-green-700 uppercase">ราคา/ชิ้น</th>
                        <th className="px-3 py-2 text-right text-xs font-bold text-green-700 uppercase">จำนวน</th>
                        <th className="px-3 py-2 text-right text-xs font-bold text-green-700 uppercase">รวมเงิน</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-100">
                      {bill.items.map((item, index) => (
                        <tr key={index}>
                          <td className="px-3 py-2 whitespace-nowrap text-sm font-medium text-gray-900">{item.name}</td>
                          <td className="px-3 py-2 whitespace-nowrap text-sm text-right text-gray-600">{formatCurrency(item.price)}</td>
                          <td className="px-3 py-2 whitespace-nowrap text-sm text-right text-gray-600">{item.qty}</td>
                          <td className="px-3 py-2 whitespace-nowrap text-sm font-bold text-right text-green-700">{formatCurrency(item.price * item.qty)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Summary Footer ที่แก้ไขแล้ว */}
                <div className="flex justify-end pt-4 border-t border-gray-200">
                  <div className="w-full max-w-xs space-y-2">
                    {/* 1. ราคาเต็มก่อนหักส่วนลด */}
                    <div className="flex justify-between text-sm text-gray-600">
                      <span>ยอดรวมสินค้า:</span>
                      <span>{formatCurrency(bill.items.reduce((acc, item) => acc + (item.price * item.qty), 0))}</span>
                    </div>

                    {/* 2. ส่วนลด (คำนวณสด) */}
                    {((bill.items.reduce((acc, item) => acc + (item.price * item.qty), 0)) - bill.totalSale) > 0 && (
                      <div className="flex justify-between text-sm text-red-600 italic">
                        <span>ส่วนลดโปรโมชั่น:</span>
                        <span>-{formatCurrency((bill.items.reduce((acc, item) => acc + (item.price * item.qty), 0)) - bill.totalSale)}</span>
                      </div>
                    )}

                    {/* 3. ยอดที่ลูกค้าต้องจ่ายจริง */}
                    <div className="flex justify-between font-bold text-xl text-orange-500 border-t pt-2 mt-2">
                      <span>ยอดชำระสุทธิ:</span>
                      <span>{formatCurrency(bill.totalSale)}</span>
                    </div>

                    {/* 4. ต้นทุน (ใส่ || 0 กัน Error ถ้าไม่มีค่า) */}
                    <div className="flex justify-between font-bold text-lg text-red-700">
                      <span>ต้นทุนรวม:</span>
                      <span>-{displayMaybeMasked(bill.totalCost || 0, true)}</span>
                    </div>

                    {/* 5. กำไรสุทธิ */}
                    <div className="flex justify-between text-sm text-green-700 pt-2 border-t border-dashed">
                      <span>กำไรสุทธิ:</span>
                      <span>{displayMaybeMasked(bill.totalSale - (bill.totalCost || 0), true)}</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Actions */}
              <div className="flex justify-center space-x-4 mt-6">
                <button
                  onClick={() => navigateTo('editBill', bill.id)}
                  className="flex items-center px-6 py-3 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600 transition shadow-lg"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clipRule="evenodd" />
                  </svg>
                  แก้ไขบิลนี้
                </button>
                <button
                  onClick={() => handlePrintBill(bill)}
                  className="flex items-center px-6 py-3 bg-red-500 text-white rounded-lg font-bold hover:bg-red-600 transition shadow-lg"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2v2H5v-2h2m0-4h2v2H7v-2m0-4h2v2H7V9m10 4h2v2h-2v-2m0-4h2v2h-2V9m0-4h-2V3h-2v2H7V3H5v2H3v14a2 2 0 002 2h14a2 2 0 002-2V5h-2v-2h-2v2zm-2 10H7v2h10v-2z" /></svg>
                  พิมพ์บิลเป็น PDF
                </button>
                <button
                  onClick={() => navigateTo('dashboard')}
                  className="flex items-center px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 transition"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                  ปิดหน้าต่าง
                </button>
              </div>
            </div>
          </div>
        );
      };

      // --- 11. Main Render Logic (Routing) ---
      const renderPage = () => {
        if (!isDbReady) {
          return <LoadingSpinner />;
        }

        switch (currentPage) {
          case 'dashboard':
            return <DashboardView />;
          case 'addBill':
            return <AddBillView />;
          case 'promotions':
            return (
              <PromotionView
                products={products}
                loadData={loadData}
                setPopupContent={setPopupContent} // เพิ่มตัวนี้
                setShowPopup={setShowPopup}       // เพิ่มตัวนี้
              />
            );
          case 'manageProducts':
            return <ProductManagerView />;
          case 'billDetail':
            return <BillDetailView />;
          case 'editBill':
            return <EditBillView />;
          // [NEW] เพิ่มการรองรับหน้าประวัติบิล
          case 'billHistory':
            return <BillHistoryView />;
          default:
            return <DashboardView />;
          case 'overview':
            return (
              <OverviewDashboard
                bills={bills}
                formatCurrency={formatCurrency}
                openPasswordModal={openPasswordModal}
                setCurrentPage={setCurrentPage}
              />
            );
        }
      };

      return (
        <div className="min-h-screen flex bg-gray-50 font-inter">
          {/* Sidebar */}
          <Sidebar />

          {/* Main Content Area */}
          <main className="flex-1 overflow-y-auto w-full lg:w-[calc(100%-16rem)]">
            {renderPage()}
          </main>

          {/* Global Pop-up Modal */}
          {showPopup && popupContent && (
            <ModalPopup
              title={popupContent.title}
              message={popupContent.message}
              onClose={() => setShowPopup(false)}
              actions={popupContent.actions}
            />
          )}
          {/* Password confirm modal replaces all prompt() calls */}
          {showPasswordModal && <PasswordConfirmModal />}
        </div>
      )
    };

    // --- 12. ReactDOM Render ---
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>

</html>
