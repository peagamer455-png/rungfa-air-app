              {endPage < totalPages && (
                <>
                  {endPage < totalPages - 1 && <span className="px-2">...</span>}
                  <button
                    onClick={() => setCurrentPage(totalPages)}
                    className={`px-3 py-1 rounded-lg ${currentPage === totalPages ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
                  >
                    {totalPages}
                  </button>
                </>
              )}

              {/* ปุ่มถัดไป */}
              <button
                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                disabled={currentPage === totalPages}
                className="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:text-gray-400"
              >
                →
              </button>
            </div>
          );
        };

        // --- Export / Import CSV functions ---
        const exportProductsCSV = () => {
          if (!products || products.length === 0) {
            setPopupContent({ title: "ข้อมูลว่าง", message: "ยังไม่มีสินค้าที่จะ export" });
            setShowPopup(true);
            return;
          }

          const BOM = "\uFEFF";
          const header = ['ID', 'ชื่อสินค้า', 'ราคาขาย', 'ราคาทุน', 'กำไรต่อชิ้น', 'จำนวนสต็อก', 'รหัสบาร์โค้ด'];

          const rows = products.map(p => {
            const price = Number(p.price) || 0;
            const cost = Number(p.cost) || 0;
            const profit = price - cost;

            return [
              String(p.id), // คอลัมน์แรกเป็น ID เสมอเพื่อใช้รันตอนนำเข้า
              p.name || '',
              price.toFixed(2),
              cost.toFixed(2),
              profit.toFixed(2),
              Number(p.stock) || 0,
              p.barcode || ''
            ];
          });

          const csv = BOM + [
            header.join(','),
            ...rows.map(r => r.map(v => {
              const strV = String(v).replace(/"/g, '""');
              return `"${strV}"`;
            }).join(','))
          ].join('\r\n');

          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const date = new Date().toISOString().slice(0, 10);
          a.href = url;
          a.download = `products_export_${date}.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          setPopupContent({ title: "Export สำเร็จ", message: `ส่งออกข้อมูลสินค้าทั้งหมด ${products.length} รายการแล้ว` });
          setShowPopup(true);
        };

        const parseCSV = (text) => {
          const lines = [];
          let cur = '';
          let inQuotes = false;
          let row = [];
          for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            const nxt = text[i + 1];
            if (ch === '"') {
              if (inQuotes && nxt === '"') {
                cur += '"'; i++;
              } else {
                inQuotes = !inQuotes;
              }
              continue;
            }
            if (ch === ',' && !inQuotes) {
              row.push(cur); cur = ''; continue;
            }
            if ((ch === '\n' || ch === '\r') && !inQuotes) {
              if (cur !== '' || row.length > 0) {
                row.push(cur); lines.push(row); row = []; cur = '';
              }
              if (ch === '\r' && nxt === '\n') i++;
              continue;
            }
            cur += ch;
          }
          if (cur !== '' || row.length > 0) { row.push(cur); lines.push(row); }
          return lines;
        };

        const handleImportFile = async (file) => {
          if (!file) return;
          const text = await file.text();
          const rows = parseCSV(text);
          if (!rows || rows.length === 0) {
            setPopupContent({ title: "ข้อผิดพลาด", message: "ไฟล์ CSV ว่างหรือไม่ถูกต้อง" });
            setShowPopup(true);
            return;
          }

          const headerRow = rows[0].map(h => h.trim().toLowerCase());
          const idIdx = headerRow.findIndex(h => h.includes('id'));
          const nameIdx = headerRow.findIndex(h => h.includes('name') || h.includes('ชื่อ'));
          const priceIdx = headerRow.findIndex(h => h.includes('price') || h.includes('ราคาขาย'));
          const costIdx = headerRow.findIndex(h => h.includes('cost') || h.includes('ราคาทุน'));
          const stockIdx = headerRow.findIndex(h => h.includes('stock') || h.includes('จำนวน') || h.includes('สต็อก'));
          const barcodeIdx = headerRow.findIndex(h => h.includes('barcode') || h.includes('รหัสบาร์โค้ด'));

          let startRow = 1;
          let imported = 0;
          let skipped = 0;

          for (let r = startRow; r < rows.length; r++) {
            const cols = rows[r];
            if (!cols || cols.length === 0) continue;

            // ดึงค่า ID จากไฟล์ (ถ้ามี)
            const idFromFile = (idIdx >= 0 && cols[idIdx]) ? cols[idIdx].trim() : null;
            const name = (cols[nameIdx >= 0 ? nameIdx : 0] || '').trim();
            const priceStr = (cols[priceIdx >= 0 ? priceIdx : 1] || '').trim();
            const costStr = (cols[costIdx >= 0 ? costIdx : 2] || '').trim();
            const stockStr = (stockIdx >= 0 ? cols[stockIdx] : '0').trim();
            const barcode = (barcodeIdx >= 0 ? cols[barcodeIdx] : '').trim();

            if (!name) continue;
            const price = parseFloat(priceStr.replace(/[^0-9.\-]/g, '')) || 0;
            const cost = parseFloat(costStr.replace(/[^0-9.\-]/g, '')) || 0;
            const stock = parseInt(stockStr.replace(/[^0-9\-]/g, '')) || 0;

            // เช็คว่ามีสินค้าเดิมอยู่ไหม (หาจาก ID ก่อน ถ้าไม่มีค่อยหาจากชื่อ)
            const currentProduct = products.find(p =>
              (idFromFile && String(p.id) === idFromFile) ||
              (p.name.toLowerCase() === name.toLowerCase())
            );

            try {
              await putData(PRODUCT_STORE, {
                // แก้ไขจุดสำคัญตรงนี้: 
                // 1. ถ้ามี ID ในไฟล์ ให้ใช้ ID จากไฟล์
                // 2. ถ้าไม่มีในไฟล์แต่ชื่อตรงกับของเดิม ให้ใช้ ID เดิม (Update)
                // 3. ถ้าไม่มีเลย ให้เป็น null เพื่อรัน Auto Increment
                id: idFromFile ? Number(idFromFile) : (currentProduct ? currentProduct.id : null),
                name,
                price,
                cost,
                barcode: barcode,
                stock: stock
              });
              imported++;
            } catch (e) {
              console.error('Import failed', e);
            }
          }

          setPopupContent({ title: "Import เสร็จสิ้น", message: `นำเข้า/อัพเดท ${imported} รายการ, ข้าม ${skipped} รายการ.` });
          setShowPopup(true);
        };

        const handleEditProductClick = (product) => {
          setCurrentProduct({
            ...product,
            stock: product.stock || 0 // มั่นใจว่ามีค่า stock
          });
          setIsEditing(true);
        };

        const handleNew = () => {
          setCurrentProduct({ id: null, name: '', price: '', cost: '', barcode: "", stock: 0 , location: ''});
          setIsEditing(true);
        };

        const handleChange = (e) => {
          const { name, value } = e.target;
          let finalValue = value;

          if (name === 'barcode') {
            finalValue = translateBarcode(value);
          } else if (name === 'price' || name === 'cost') {
            finalValue = parseFloat(value) || '';
          } else if (name === 'stock') {
            finalValue = parseInt(value) || 0;
          }

          setCurrentProduct(prev => ({
            ...prev,
            [name]: finalValue
          }));
        };

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!currentProduct.name || currentProduct.price === '' || currentProduct.cost === '') {
            setPopupContent({ title: "ข้อผิดพลาด", message: "กรุณาใส่ชื่อสินค้า, ราคาขาย และราคาทุนให้ครบถ้วน" });
            setShowPopup(true);
            return;
          }

          const finalBarcode = (currentProduct.barcode || '').trim();

          if (finalBarcode) {
            const isBarcodeSameAsOtherProductId = products.some(p =>
              String(p.id) === finalBarcode && p.id !== currentProduct.id
            );
            if (isBarcodeSameAsOtherProductId) {
              setPopupContent({ title: "ข้อผิดพลาด", message: `รหัสบาร์โค้ด '${finalBarcode}' นี้ซ้ำกับรหัสสินค้าอัตโนมัติอื่น` });
              setShowPopup(true);
              return;
            }
            const isDuplicateCustomBarcode = products.some(p =>
              p.barcode === finalBarcode && p.id !== currentProduct.id
            );
            if (isDuplicateCustomBarcode) {
              setPopupContent({ title: "ข้อผิดพลาด", message: `รหัสบาร์โค้ด '${finalBarcode}' นี้มีสินค้าอื่นใช้แล้ว` });
              setShowPopup(true);
              return;
            }
          }

          // บรรทัดที่ส่งข้อมูล (ในฟังก์ชันบันทึกสินค้า)
          const productToSave = {
            ...currentProduct,
            price: parseFloat(currentProduct.price) || 0,
            cost: parseFloat(currentProduct.cost) || 0,
            stock: parseInt(currentProduct.stock) || 0,
            location: currentProduct.location || "",
            barcode: finalBarcode || undefined
          };

          try {
            // 1. บันทึกข้อมูล
            await putData(PRODUCT_STORE, productToSave);


            // 3. ปิดโหมดแก้ไข
            setIsEditing(false);

            // 4. [หัวใจสำคัญ] บังคับให้หน้าปัจจุบันยังคงเป็น 'inventory'
            // แม้จะโหลดข้อมูลใหม่ แต่เราสั่งล็อกให้มันยังอยู่ที่เดิม
            setCurrentPage('inventory');

            setPopupContent({
              title: "สำเร็จ",
              message: `บันทึกสินค้า "${currentProduct.name}" เรียบร้อยแล้ว`
            });
            setShowPopup(true);

          } catch (e) {
            console.error("Error saving product:", e);
          }
        };

        const handleDelete = (id, name) => {
          setPopupContent({
            title: "ยืนยันการลบ",
            message: `คุณต้องการลบสินค้า "${name}" หรือไม่?`,
            actions: [
              { label: "ยกเลิก", handler: () => { } },
              {
                label: "ลบ", primary: true, handler: async () => {
                  await deleteData(PRODUCT_STORE, id);
                  setPopupContent({ title: "สำเร็จ", message: `ลบสินค้า "${name}" เรียบร้อยแล้ว` });
                  setShowPopup(true);
                }
              }
            ]
          });
          setShowPopup(true);
        };

        const generateBarcode = async (product) => {
          const barcodeValue = product.barcode ? String(product.barcode) : String(product.id);
          try {
            const pageWmm = 210; const pageHmm = 297; const margin = 10;
            const cols = 7; const rows = 13; const total = cols * rows; const gutter = 2;
            const cellWmm = (pageWmm - margin * 2 - gutter * (cols - 1)) / cols;
            const cellHmm = (pageHmm - margin * 2 - gutter * (rows - 1)) / rows;
            const scale = 4; const pxPerMm = 300 / 25.4;
            const imgWpx = Math.round(cellWmm * 0.9 * pxPerMm * scale);
            const imgHpx = Math.round(cellHmm * 0.7 * pxPerMm * scale);
            const canvas = document.createElement('canvas');
            canvas.width = imgWpx; canvas.height = imgHpx;
            const moduleWidth = Math.max(0.2, imgWpx / 100 / scale);

            JsBarcode(canvas, barcodeValue, {
              format: "CODE128", width: moduleWidth, height: imgHpx,
              displayValue: false, margin: 0, background: "#ffffff"
            });

            const barcodeUrl = canvas.toDataURL('image/png', 1.0);
            const container = document.createElement('div');
            container.style.width = `${pageWmm}mm`; container.style.height = `${pageHmm}mm`;
            container.style.padding = `${margin}mm`; container.style.display = 'grid';
            container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; container.style.gap = `${gutter}mm`;
            container.style.background = '#fff'; container.style.boxSizing = 'border-box';

            for (let i = 0; i < total; i++) {
              const cell = document.createElement('div');
              cell.style.border = '0.1mm solid rgba(0,0,0,0.1)'; cell.style.padding = '1mm';
              cell.style.display = 'flex'; cell.style.flexDirection = 'column';
              cell.style.alignItems = 'center'; cell.style.justifyContent = 'flex-start';
              cell.style.height = `${cellHmm - 2}mm`;

              const img = document.createElement('img');
              img.src = barcodeUrl; img.style.width = '100%'; img.style.height = 'auto';
              img.style.maxHeight = '70%'; img.style.marginTop = '0.5mm';

              const text = document.createElement('div');
              text.textContent = `${product.name} ${formatCurrency(product.price)}`;
              text.style.fontSize = '6pt'; text.style.marginTop = '0.8mm';
              text.style.textAlign = 'center'; text.style.width = '100%';
              text.style.overflow = 'hidden'; text.style.textOverflow = 'ellipsis';
              text.style.whiteSpace = 'nowrap';

              cell.appendChild(img); cell.appendChild(text);
              container.appendChild(cell);
            }
            document.body.appendChild(container);
            const opt = {
              margin: [0, 0, 0, 0], filename: `barcode_${product.id}.pdf`,
              image: { type: 'jpeg', quality: 1.0 },
              html2canvas: { scale: 3, useCORS: true, scrollY: 0, y: 0 },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            await html2pdf().from(container).set(opt).save();
            setTimeout(() => document.body.removeChild(container), 1000);
          } catch (error) {
            console.error("Error generating barcode:", error);
          }
        };

        if (isEditing) {
          return (
            <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
              <Header title={currentProduct.id ? "✏️ แก้ไขสินค้า" : "➕ เพิ่มสินค้าใหม่"} />
              <div className="max-w-xl mx-auto mt-6 p-6 bg-white rounded-xl shadow-lg">
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อสินค้า</label>
                    <input type="text" name="name" value={currentProduct.name} onChange={handleChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" required />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ราคาขาย</label>
                      <input type="number" name="price" value={currentProduct.price} onChange={handleChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" min="0" step="0.01" required />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ราคาทุน</label>
                      <input type="number" name="cost" value={currentProduct.cost} onChange={handleChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" min="0" step="0.01" required />
                    </div>
                  </div>

                  {/* [เพิ่มส่วนจำนวนสต็อก] */}
                  <div>
                    <label className="block text-sm font-bold text-grey-600 mb-1">📦 จำนวนคงเหลือในสต็อก</label>
                    <input type="number" name="stock" value={currentProduct.stock} onChange={handleChange} className="w-full p-3 border-2 border-blue-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 font-bold" min="0" />
                  </div>

                  <div className="space-y-2">
                    <label className="text-sm font-medium text-gray-700">ที่เก็บสินค้า (ชั้น/โซน)</label>
                    <input
                      type="text"
                      className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                      placeholder="เช่น ชั้น A1, โซนหลังร้าน"
                      value={currentProduct.location || ''}
                      onChange={(e) => setCurrentProduct({ ...currentProduct, location: e.target.value })}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">รหัสบาร์โค้ด</label>
                    <input type="text" name="barcode" placeholder="เว้นว่างเพื่อใช้รหัสอัตโนมัติ" value={currentProduct.barcode || ''} onChange={handleChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" />
                  </div>

                  <div className="flex justify-end space-x-3 pt-4">
                    <button type="button" onClick={() => setIsEditing(false)} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition duration-150">ยกเลิก</button>
                    <button type="submit" className="px-6 py-2 bg-green-500 text-white rounded-lg font-semibold hover:bg-green-600 transition duration-150 shadow-md">บันทึกสินค้า</button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title="📦 จัดการสินค้า" />
            <div className="mt-6 flex flex-col sm:flex-row justify-between items-center mb-4 space-y-3 sm:space-y-0">
              <input type="text" placeholder="🔍 ค้นหาสินค้า..." value={filterText} onChange={handleFilterChange} className="w-full sm:w-80 p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500" />
              <div className="text-sm text-gray-600">แสดง {currentProducts.length} จาก {filteredProducts.length} รายการ</div>
              <div className="flex items-center space-x-2">
                <label className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg cursor-pointer hover:bg-gray-300 text-sm">
                  นำเข้า CSV <input type="file" accept=".csv" onChange={(e) => handleImportFile(e.target.files ? e.target.files[0] : null)} className="hidden" />
                </label>
                <button onClick={exportProductsCSV} className="px-4 py-2 bg-blue-500 text-white rounded-lg font-semibold hover:bg-blue-600 text-sm">ส่งออก Excel</button>
                <button onClick={handleNew} className="flex items-center px-4 py-2 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600 shadow-md text-sm">เพิ่มสินค้าใหม่</button>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-lg overflow-x-auto border border-gray-100">
              <table className="min-w-full divide-y divide-gray-200">
                <thead className="bg-green-50">
                  <tr>
                    <th className="px-6 py-3 text-left text-xs font-bold text-green-700 uppercase">ชื่อสินค้า</th>
                    <th className="px-6 py-3 text-left text-xs font-bold text-blue-600 uppercase">สต็อกคงเหลือ</th>
                    <th className="px-6 py-3 text-left text-xs font-bold text-green-700 uppercase">ราคาขาย</th>
                    <th className="px-6 py-3 text-left text-xs font-bold text-green-700 uppercase">ราคาทุน</th>
                    <th className="px-6 py-3 text-left text-xs font-bold text-green-700 uppercase">กำไรต่อชิ้น</th>
                    <th className="px-6 py-3 text-right text-xs font-bold text-green-700 uppercase">จัดการ</th>
                  </tr>
                </thead>
                <tbody className="bg-white divide-y divide-gray-100">
                  {currentProducts.map((product) => (
                    <tr key={product.id} className="hover:bg-green-50 transition duration-100">
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{product.name}</td>
                      <td className="px-6 py-4">
                        {/* ใช้ชื่อตัวแปรให้ตรงกับข้างบน คือ product */}
                        <span className={`font-bold ${product.stock <= 5 ? 'text-red-600' : 'text-blue-600'}`}>
                          {product.stock}
                        </span>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{formatCurrency(product.price)}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-red-600">{displayMaybeMasked(product.cost, true)}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-semibold text-green-600">{displayMaybeMasked(product.price - product.cost, true)}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                        <button
                          onClick={() => generateBarcode(product)}
                          className="text-blue-600 hover:text-blue-800 p-1 rounded-full hover:bg-blue-100 transition"
                          title="สร้างบาร์โค้ด"
                          aria-label="Generate Barcode"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" />
                            <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z" />
                          </svg>

                        </button>
                        <button
                          onClick={() => handleEditProductClick(product)}
                          className="text-green-600 hover:text-green-800 p-1 rounded-full hover:bg-green-100 transition"
                          aria-label="Edit"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-7-7l-4 4-2 2v2h2l2-2 4-4m-7-7l4-4 2 2" />
                          </svg>
                        </button>
                        <button
                          onClick={() => handleDelete(product.id, product.name)}
                          className="text-red-600 hover:text-red-800 p-1 rounded-full hover:bg-red-100 transition"
                          aria-label="Delete"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {currentProducts.length === 0 && (
                <div className="p-6 text-center text-gray-500">
                  ไม่พบสินค้าในระบบ
                </div>
              )}
            </div>

            {/* แสดง Pagination ถ้ามีมากกว่า 1 หน้า */}
            {totalPages > 1 && <Pagination />}
          </div>
        );
      };

      // --- 9. Add Bill View ---

      const AddBillView = () => {
        // เพิ่ม state สำหรับการรับเงินและทอนเงิน
        const [amountReceived, setAmountReceived] = useState('');
        const [skipChange, setSkipChange] = useState(false);
        const [customer, setCustomer] = useState(() => localStorage.getItem('pending_bill_customer') || '');
        const [customerDetails, setCustomerDetails] = useState(() => localStorage.getItem('pending_bill_details') || '');
        const [billItems, setBillItems] = useState(() => {
          const saved = localStorage.getItem('pending_bill_items');
          return saved ? JSON.parse(saved) : [];
        });
        const [searchTerm, setSearchTerm] = useState('');
        const [currentBillId, setCurrentBillId] = useState(null);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [isCreatingBill, setIsCreatingBill] = useState(true); // เพิ่มสถานะว่ากำลังสร้างบิลอยู่const thaiToEng = (text) => {
        const [promotions, setPromotions] = React.useState([]);

        useEffect(() => {
          localStorage.setItem('pending_bill_items', JSON.stringify(billItems));
          localStorage.setItem('pending_bill_customer', customer);
          localStorage.setItem('pending_bill_details', customerDetails);
        }, [billItems, customer, customerDetails]);

        useEffect(() => {
          const fetchPromos = async () => {
            const data = await getAll('promotions');
            setPromotions(data || []);
          };
          fetchPromos();
        }, []);

        const clearDraft = () => {
          localStorage.removeItem('pending_bill_items');
          localStorage.removeItem('pending_bill_customer');
          localStorage.removeItem('pending_bill_details');
          setBillItems([]);
          setCustomer('');
          setCustomerDetails('');
        };

        // Calculate Totals
        React.useEffect(() => {
          const loadPromos = async () => {
            const data = await getAll('promotions');
            setPromotions(data || []);
          };
          loadPromos();
        }, []);

        // คำนวณราคาทั้งหมด (Subtotal, Discount, Total)
        const { subTotal, totalDiscount, totalSale, appliedPromotions } = React.useMemo(() => {
          // ราคารวมก่อนหักส่วนลด
          let sub = billItems.reduce((acc, item) => acc + (item.price * item.qty), 0);
          let discounts = [];

          promotions.forEach(promo => {
            if (promo.type === 'qty') {
              const item = billItems.find(i => i.productId === promo.items[0]?.id);
              if (item && item.qty >= promo.minQty) {
                const sets = Math.floor(item.qty / promo.minQty);
                const savings = ((item.price * promo.minQty) - promo.discountPrice) * sets;
                if (savings > 0) discounts.push({ name: promo.name, amount: savings });
              }
            } else if (promo.type === 'bundle') {
              const itemA = billItems.find(i => i.productId === promo.items[0]?.id);
              const itemB = billItems.find(i => i.productId === promo.items[1]?.id);
              if (itemA && itemB) {
                const sets = Math.min(itemA.qty, itemB.qty);
                const savings = ((itemA.price + itemB.price) - promo.discountPrice) * sets;
                if (savings > 0) discounts.push({ name: promo.name, amount: savings });
              }
            }
          });

          const totalDisc = discounts.reduce((acc, d) => acc + d.amount, 0);
          return {
            subTotal: sub,
            totalDiscount: totalDisc,
            totalSale: sub - totalDisc,
            appliedPromotions: discounts
          };
        }, [billItems, promotions]);

        // Product Search Logic
        const searchResults = useMemo(() => {
          if (!searchTerm) return [];

          // 1. เตรียมคำค้นหา: ลบเว้นวรรคออกทั้งหมด และทำเป็นตัวเล็ก
          // ใช้ .trim() ก่อนแล้วค่อย replace ช่องว่างข้างใน
          const cleanSearch = searchTerm.trim().replace(/\s+/g, '').toLowerCase();

          return products
            .filter(p => {
              // ป้องกัน Error กรณี p.name เป็นค่าว่าง
              if (!p.name) return false;

              // 2. เตรียมชื่อสินค้า: ลบเว้นวรรคออกทั้งหมด และทำเป็นตัวเล็ก
              const cleanName = String(p.name).replace(/\s+/g, '').toLowerCase();

              // 3. เตรียมบาร์โค้ด (ถ้ามี): ลบเว้นวรรคออก
              const cleanBarcode = String(p.barcode || '').replace(/\s+/g, '').toLowerCase();

              // ตรวจสอบว่าคำค้นหามีอยู่ในชื่อ หรือ บาร์โค้ด หรือไม่
              return cleanName.includes(cleanSearch) || cleanBarcode.includes(cleanSearch);
            })
            // กรองสินค้าที่สต็อกเป็น 0 หรือติดลบออก
            .filter(p => (Number(p.stock) || 0) > 0)
            // เช็คไม่ให้ซ้ำกับสินค้าที่เลือกไปแล้ว (ตรวจสอบ ID ให้ตรงกัน)
            .filter(p => !billItems.some(item => String(item.id) === String(p.id)))
            .sort((a, b) => String(a.name).localeCompare(String(b.name), 'th'));
        }, [searchTerm, products, billItems]);

        const addItemToBill = (product) => {
          setBillItems(prev => {
            // Ensure product is not already added (should be filtered by searchResults, but good safeguard)
            if (prev.find(item => item.productId === product.id)) return prev;

            return [...prev, {
              productId: product.id,
              name: product.name,
              price: product.price,
              cost: product.cost,
              qty: 1 // Start with quantity 1
            }];
          });
          setSearchTerm(''); // Clear search after adding
        };

        // [NEW] Allows manual input, prevents quantity < 1 (for AddBillView)
        const updateItemQtyManual = (productId, newQty) => {
          const qty = parseInt(newQty);
          const product = products.find(p => p.id === productId);
          const maxStock = product ? (product.stock || 0) : 0;

          setBillItems(prev => prev.map(item => {
            if (item.productId === productId) {
              let finalQty = isNaN(qty) || qty <= 0 ? 1 : qty;
              if (finalQty > maxStock) {
                setPopupContent({
                  title: "จำนวนเกินสต็อก",
                  message: `สต็อกสินค้า "${item.name}" มีจำกัดเพียง ${maxStock} ชิ้น`
                });
                setShowPopup(true);
                finalQty = maxStock;
              }
              return { ...item, qty: finalQty };
            }
            return item;
          }));
        };

        const updateItemQty = (productId, delta) => {
          setBillItems(prev => prev.map(item => {
            if (item.productId === productId) {
              const product = products.find(p => p.id === productId);
              const maxStock = product ? (product.stock || 0) : 0;
              const newQty = item.qty + delta;

              if (newQty > maxStock) {
                setPopupContent({
                  title: "สินค้าไม่พอ",
                  message: `ขออภัย สินค้า "${item.name}" ในสต็อกเหลือเพียง ${maxStock} ชิ้น`
                });
                setShowPopup(true);
                return { ...item, qty: maxStock };
              }
              return { ...item, qty: newQty < 1 ? 1 : newQty };
            }
            return item;
          }));
        };

        const removeItem = (productId) => {
          setBillItems(prev => prev.filter(item => item.productId !== productId));
        };

        const handleSaveBill = async () => {
          if (billItems.length === 0) return;
          setIsSubmitting(true);

          // 1. คำนวณยอดรวมสินค้าแบบเต็ม (Subtotal)
          const subTotal = billItems.reduce((sum, item) => sum + (Number(item.price) * Number(item.qty)), 0);

          // 2. ดึงค่าส่วนลดจากตัวแปรหน้าจอ (สมมติว่าคุณมีตัวแปร totalDiscount ที่คำนวณโปรโมชั่นไว้แล้ว)
          const discountAmount = typeof totalDiscount !== 'undefined' ? totalDiscount : 0;

          // 3. คำนวณยอดขายจริงที่หักส่วนลดแล้ว (นี่คือยอดที่ต้องบันทึกลง DB)
          const finalTotalSale = subTotal - discountAmount;

          // 4. คำนวณต้นทุนรวม
          const totalCost = billItems.reduce((sum, item) => sum + (Number(item.cost || 0) * Number(item.qty)), 0);

          // 5. คำนวณกำไรสุทธิ (จากยอดที่ลดแล้ว)
          const totalProfit = finalTotalSale - totalCost;

          const finalBill = {
            date: new Date().toISOString(),
            customer,
            customerDetails,
            items: billItems,
            appliedPromotions,
            totalSale: finalTotalSale, // <--- แก้เป็นยอดที่หักส่วนลดแล้ว
            totalCost,
            totalProfit,
            status: 'completed'
          };

          try {
            const savedId = await putData(BILL_STORE, finalBill);

            // 1. ตัดสต็อกสินค้า
            for (const item of billItems) {
              const product = products.find(p => p.id === item.productId);
              if (product) {
                await putData(PRODUCT_STORE, {
                  ...product,
                  stock: (product.stock || 0) - item.qty
                });
              }
            }


            // 3. ล้างข้อมูลที่เซฟสำรองไว้
            localStorage.removeItem('pending_bill_items');
            localStorage.removeItem('pending_bill_customer');
            localStorage.removeItem('pending_bill_details');
            setBillItems([]);
            setCustomer('');
            setCustomerDetails('');

            setIsSubmitting(false);
            setIsCreatingBill(false);

            // 4. แสดง Popup สำเร็จ
            setPopupContent({
              title: "บันทึกบิลสำเร็จ",
              message: `บันทึกบิลเลขที่ ${savedId} เรียบร้อยแล้ว`,
              actions: [
                {
                  label: "ปิดหน้าต่าง",
                  handler: () => {
                    setShowPopup(false);
                    navigateTo('dashboard');
                  }
                },
                {
                  label: "🖨️ พิมพ์บิล",
                  primary: true,
                  handler: () => {
                    const billToPrint = { ...finalBill, id: savedId };
                    handlePrintBill(billToPrint);
                    setShowPopup(false);
                    navigateTo('dashboard');
                  }
                }
              ]
            });
            setShowPopup(true);

          } catch (e) {
            console.error("Save error:", e);
            setIsSubmitting(false);
            setPopupContent({
              title: "ข้อผิดพลาด",
              message: "ไม่สามารถบันทึกบิลได้ กรุณาตรวจสอบ Console Log"
            });
            setShowPopup(true);
          }
        };

        // เพิ่ม hook สำหรับจัดการการแสกนบาร์โค้ด
        const useBarcodeScan = (onScan, isEnabled = true) => {
          const [barcodeBuffer, setBarcodeBuffer] = useState('');
          const [lastScanTime, setLastScanTime] = useState(0);

          useEffect(() => {
            if (!isEnabled) return;

            const handleKeyPress = (e) => {
              const currentTime = new Date().getTime();

              // ถ้าเวลาระหว่างการกดปุ่มห่างกันเกิน 100ms ให้เริ่มบันทึกใหม่
              if (currentTime - lastScanTime > 100) {
                setBarcodeBuffer('');
              }
              setLastScanTime(currentTime);

              // เก็บตัวอักษรที่กดเข้า buffer
              if (e.key !== 'Enter') {
                setBarcodeBuffer(prev => prev + e.key);
              } else {
                // *** [FIX] ป้องกันไม่ให้ Enter ไปกดปุ่มอื่นใน DOM ***
                e.preventDefault();
                e.stopPropagation();
                // ************************************************
                // เมื่อกด Enter ให้ส่งค่าไปยัง callback
                if (barcodeBuffer) {
                  onScan(barcodeBuffer);
                  setBarcodeBuffer('');
                }
              }
            };

            window.addEventListener('keypress', handleKeyPress);
            return () => window.removeEventListener('keypress', handleKeyPress);
          }, [barcodeBuffer, lastScanTime, onScan, isEnabled]);
        };



        // เพิ่มฟังก์ชันจัดการบาร์โค้ด
        const handleBarcodeScan = useCallback((barcode) => {
          const engBarcode = translateBarcode(barcode);
          console.log("raw:", barcode);
          console.log("eng:", engBarcode);
          // หาสินค้าจากบาร์โค้ด (ID)
          const product = products.find(p => {
            const customBarcode = p.barcode ? String(p.barcode).toLowerCase() : null; // ทำให้เป็นตัวพิมพ์เล็กเสมอ
            const systemId = String(p.id);

            // 1. ค้นหาจากรหัสบาร์โค้ดที่ตั้งเอง (ตัวพิมพ์เล็ก)
            const isMatchCustom = customBarcode && customBarcode === engBarcode;
            // 2. ค้นหาจาก ID สินค้าอัตโนมัติ (Fallback)
            const isMatchSystem = systemId === engBarcode;

            return isMatchCustom || isMatchSystem;
          });
          if (!product) {
            setPopupContent({
              title: "ไม่พบสินค้า",
              message: `ไม่พบสินค้าที่มีรหัสบาร์โค้ด: ${barcode}`
            });
            setShowPopup(true);
            setSearchTerm('');
            return;
          }

          // เพิ่มสินค้าลงในบิล หรือเพิ่มจำนวนถ้ามีอยู่แล้ว
          setBillItems(prev => {
            const existingItem = prev.find(item => item.productId === product.id);
            if (existingItem) {
              const nextQty = existingItem.qty + 1;

              // ตรวจสอบสต็อก: ถ้าจำนวนถัดไปเกินสต็อกที่มี
              if (nextQty > (product.stock || 0)) {
                setPopupContent({
                  title: "สินค้าในสต็อกไม่พอ",
                  message: `ไม่สามารถเพิ่ม "${product.name}" ได้แล้ว เนื่องจากในสต็อกมีเพียง ${product.stock} ชิ้น`
                });
                setShowPopup(true);
                return prev;
              }

              return prev.map(item =>
                item.productId === product.id
                  ? { ...item, qty: nextQty }
                  : item
              );
            }

            if ((product.stock || 0) <= 0) {
              setPopupContent({
                title: "สินค้าหมด",
                message: `ไม่สามารถเพิ่ม "${product.name}" ได้เนื่องจากไม่มีสินค้าในสต็อก`
              });
              setShowPopup(true);
              return prev;
            }

            return [...prev, {
              productId: product.id,
              name: product.name,
              price: product.price,
              cost: product.cost,
              qty: 1
            }];
          });
        }, [products, isCreatingBill]);

        useBarcodeScan(handleBarcodeScan, true);

        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title="🧾 สร้างบิลใหม่" />
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
              {/* Left Column: Inputs & Search */}
              <div className="lg:col-span-2 space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-lg space-y-4">
                  <h3 className="text-lg font-bold text-green-700">ข้อมูลลูกค้า / ช่าง</h3>
                  <input
                    type="text"
                    placeholder="ชื่อลูกค้า / ชื่อช่าง (ไม่บังคับ)"
                    value={customer}
                    onChange={(e) => setCustomer(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />
                  <input
                    type="text"
                    placeholder="รายละเอียดลูกค้า (ไม่บังคับ)"
                    value={customerDetails}
                    onChange={(e) => setCustomerDetails(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />

                  <h3 className="text-lg font-bold text-green-700 pt-4">🔍 ค้นหาสินค้าเพื่อเพิ่มในบิล</h3>
                  <input
                    type="text"
                    placeholder="พิมพ์ชื่อสินค้า..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />

                  {/* Search Results Dropdown */}
                  {searchTerm && searchResults.length > 0 && (
                    <div className="bg-white border border-green-200 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                      {searchResults.map(p => (
                        <div
                          key={p.id}
                          onClick={() => addItemToBill(p)}
                          className="flex justify-between items-center p-3 cursor-pointer hover:bg-green-100 transition duration-100 border-b last:border-b-0"
                        >
                          <div className="flex flex-col">
                            <span className="font-medium text-gray-800">{p.name}</span>
                            {/* [แก้ไข] แสดงสีตามเงื่อนไข: <= 5 สีแดง, > 5 สีน้ำเงิน */}
                            <span className={`text-sm font-semibold ${p.stock <= 5 ? 'text-red-600' : 'text-blue-600'}`}>
                              คงเหลือ: {p.stock || 0} {p.unit || 'ชิ้น'}
                            </span>
                          </div>
                          <span className="text-sm font-semibold text-green-600">{formatCurrency(p.price)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Bill Items List */}
                <div className="bg-white p-6 rounded-xl shadow-lg">
                  <h3 className="text-xl font-bold text-green-700 mb-4 border-b pb-2">รายการสินค้าในบิล ({billItems.length} รายการ)</h3>
                  <div className="space-y-3">
                    {billItems.length === 0 ? (
                      <p className="text-gray-500 text-center">กรุณาเพิ่มสินค้าจากช่องค้นหาด้านบน</p>
                    ) : (
                      billItems.map(item => (
                        <div key={item.productId} className="flex items-center justify-between p-3 border border-green-100 rounded-lg bg-green-50">
                          {/* Item Name & Price */}
                          <div className="flex-1 min-w-0 pr-3">
                            <p className="font-semibold text-gray-800 truncate">{item.name}</p>
                            <p className="text-xs text-gray-500">@{formatCurrency(item.price)}</p>
                          </div>

                          {/* Quantity Control */}
                          <div className="flex items-center space-x-2">
                            <button
                              onClick={() => updateItemQty(item.productId, -1)}
                              className="p-1 w-8 h-8 flex items-center justify-center bg-gray-200 rounded-full text-gray-700 hover:bg-gray-300 transition"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" /></svg>
                            </button>
                            {/* ปรับปรุง: ใช้ input แทน span เพื่อให้แก้ไขจำนวนด้วยมือได้ */}
                            <input
                              type="number"
                              min="0"
                              value={item.qty}
                              onChange={(e) => updateItemQtyManual(item.productId, e.target.value)}
                              className="font-bold text-gray-900 w-12 text-center p-1 border rounded-md"
                            />
                            <button
                              onClick={() => updateItemQty(item.productId, 1)}
                              className="p-1 w-8 h-8 flex items-center justify-center bg-green-400 text-white rounded-full hover:bg-green-500 transition"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                            </button>
                          </div>

                          {/* Total & Remove */}
                          <div className="ml-4 w-24 text-right">
                            <p className="font-bold text-green-700">{formatCurrency(item.price * item.qty)}</p>
                          </div>
                          <button
                            onClick={() => removeItem(item.productId)}
                            className="ml-3 text-red-500 hover:text-red-700 p-1 rounded-full hover:bg-red-100 transition"
                            aria-label="Remove Item"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                          </button>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>

              {/* Right Column: Summary & Action */}
              <div className="lg:col-span-1">
                <div className="sticky top-20 bg-green-700 text-white p-6 rounded-xl shadow-2xl space-y-4">
                  <h3 className="text-2xl font-black mb-4 border-b border-green-500 pb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                    สรุปยอดรวม
                  </h3>

                  {/* ยอดรวมก่อนหักส่วนลด */}
                  <div className="flex justify-between items-center text-sm opacity-80">
                    <span>ราคารวมสินค้า</span>
                    <span>{formatCurrency(subTotal)}</span>
                  </div>

                  {/* รายการส่วนลดที่ได้รับ */}
                  {totalDiscount > 0 && (
                    <div className="space-y-1 py-3 border-y border-green-600 border-dashed">
                      <div className="text-xs font-bold text-green-300 uppercase tracking-widest">ส่วนลดโปรโมชั่น:</div>
                      {appliedPromotions.map((p, idx) => (
                        <div key={idx} className="flex justify-between text-sm text-yellow-200 italic">
                          <span>- {p.name}</span>
                          <span>{formatCurrency(p.amount)}</span>
                        </div>
                      ))}
                      <div className="flex justify-between font-bold text-yellow-300 pt-1 border-t border-green-800">
                        <span>รวมส่วนลดทั้งหมด</span>
                        <span>- {formatCurrency(totalDiscount)}</span>
                      </div>
                    </div>
                  )}

                  {/* ยอดสุทธิที่ลูกค้าต้องจ่าย */}
                  <div className="flex justify-between items-center text-xl font-black pt-2">
                    <span className="text-green-200">ยอดสุทธิ</span>
                    <span className="text-3xl text-white drop-shadow-md">{formatCurrency(totalSale)}</span>
                  </div>

                  {/* ส่วนรับเงิน */}
                  <div className="mt-6 pt-4 border-t border-green-500">
                    <label className="block text-sm font-medium mb-1 text-green-100">รับเงินมา</label>
                    <input
                      type="number"
                      value={amountReceived}
                      onChange={(e) => setAmountReceived(e.target.value)}
                      className="w-full p-3 bg-white text-gray-900 rounded-lg font-bold text-xl focus:ring-4 focus:ring-yellow-400 outline-none transition-all"
                      placeholder="ยอดเงินจากลูกค้า"
                      disabled={skipChange}
                    />
                  </div>

                  {/* แสดงเงินทอน */}
                  <div className="flex justify-between items-center text-lg bg-green-800 p-4 rounded-xl border border-green-600">
                    <span>เงินทอน</span>
                    <span className="text-yellow-300 font-black text-3xl">
                      {formatCurrency(Math.max(0, parseFloat(amountReceived || '0') - totalSale))}
                    </span>
                  </div>

                  <button
                    onClick={handleSaveBill}
                    disabled={isSubmitting || billItems.length === 0}
                    className="w-full mt-4 py-5 bg-yellow-400 text-green-900 rounded-xl font-black text-xl hover:bg-yellow-300 active:scale-95 transition-all shadow-xl disabled:bg-gray-400 disabled:text-gray-200 flex items-center justify-center border-b-4 border-yellow-600"
                  >
                    {isSubmitting ? (
                      <div className="flex items-center gap-2">
                        <svg className="animate-spin h-6 w-6 text-green-900" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        กำลังบันทึก...
                      </div>
                    ) : (
                      <span>💾 บันทึก & พิมพ์บิล</span>
                    )}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- 9.5. Edit Bill View (New Component) ---

      const EditBillView = () => {
        const billToEdit = bills.find(b => b.id === currentBillId);

        // ถ้าไม่พบบิล ให้กลับไปหน้า dashboard
        if (!billToEdit) {
          navigateTo('dashboard');
          return null;
        }

        const [amountReceived, setAmountReceived] = useState('');
        const [skipChange, setSkipChange] = useState(false);
        const [customer, setCustomer] = useState(() =>
          localStorage.getItem(`edit_bill_customer_${currentBillId}`) || billToEdit.customer || ''
        );
        const [customerDetails, setCustomerDetails] = useState(() =>
          localStorage.getItem(`edit_bill_details_${currentBillId}`) || billToEdit.customerDetails || ''
        );
        const [billItems, setBillItems] = useState(() => {
          const saved = localStorage.getItem(`edit_bill_items_${currentBillId}`);
          return saved ? JSON.parse(saved) : (billToEdit.items || []);
        });
        const [searchTerm, setSearchTerm] = useState('');
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [promotions, setPromotions] = React.useState([]);

        useEffect(() => {
          if (currentBillId) {
            localStorage.setItem(`edit_bill_items_${currentBillId}`, JSON.stringify(billItems));
            localStorage.setItem(`edit_bill_customer_${currentBillId}`, customer);
            localStorage.setItem(`edit_bill_details_${currentBillId}`, customerDetails);
          }
        }, [billItems, customer, customerDetails, currentBillId]);

        useEffect(() => {
          const fetchPromos = async () => {
            const data = await getAll('promotions');
            setPromotions(data || []);
          };
          fetchPromos();
        }, []);

        const clearDraft = () => {
          localStorage.removeItem('pending_bill_items');
          localStorage.removeItem('pending_bill_customer');
          localStorage.removeItem('pending_bill_details');
          setBillItems([]);
          setCustomer('');
          setCustomerDetails('');
        };

        // คำนวณยอดรวม

        // โหลดโปรโมชั่นมาเตรียมคำนวณ
        React.useEffect(() => {
          const loadPromos = async () => {
            const data = await getAll('promotions');
            setPromotions(data || []);
          };
          loadPromos();
        }, []);

        // คำนวณยอดสรุปทั้งหมด
        const { subTotal, totalDiscount, totalSale, appliedPromotions } = React.useMemo(() => {
          // 1. ยอดรวมก่อนหักส่วนลด
          let sub = billItems.reduce((acc, item) => acc + (item.price * item.qty), 0);
          let discounts = [];

          // 2. คำนวณส่วนลดตามโปรโมชั่น ก-ฮ ที่สร้างไว้
          promotions.forEach(promo => {
            if (promo.type === 'qty') {
              const item = billItems.find(i => i.productId === promo.items[0]?.id);
              if (item && item.qty >= promo.minQty) {
                const sets = Math.floor(item.qty / promo.minQty);
                const savings = ((item.price * promo.minQty) - promo.discountPrice) * sets;
                if (savings > 0) discounts.push({ name: promo.name, amount: savings });
              }
            } else if (promo.type === 'bundle') {
              const itemA = billItems.find(i => i.productId === promo.items[0]?.id);
              const itemB = billItems.find(i => i.productId === promo.items[1]?.id);
              if (itemA && itemB) {
                const sets = Math.min(itemA.qty, itemB.qty);
                const savings = ((itemA.price + itemB.price) - promo.discountPrice) * sets;
                if (savings > 0) discounts.push({ name: promo.name, amount: savings });
              }
            }
          });

          const totalDisc = discounts.reduce((acc, d) => acc + d.amount, 0);
          return {
            subTotal: sub,
            totalDiscount: totalDisc,
            totalSale: sub - totalDisc,
            appliedPromotions: discounts
          };
        }, [billItems, promotions]);

        // ค้นหาสินค้า
        const searchResults = useMemo(() => {
          if (!searchTerm) return [];

          // 1. ลบเว้นวรรคออกจากคำค้นหาและทำเป็นตัวเล็ก
          const cleanSearch = searchTerm.replace(/\s+/g, '').toLowerCase();

          return products
            .filter(p => {
              // 2. ลบเว้นวรรคออกจากชื่อสินค้าที่จะเทียบ
              const cleanName = (p.name || '').replace(/\s+/g, '').toLowerCase();
              // คืนค่า true ถ้าชื่อสินค้าที่ลบเว้นวรรคแล้ว มีคำค้นหาอยู่ในนั้น
              return cleanName.includes(cleanSearch);
            })
            // กรองสินค้าที่สต็อกเป็น 0 หรือติดลบออก
            .filter(p => (p.stock || 0) > 0)
            // เช็คไม่ให้ซ้ำกับสินค้าที่เลือกไปแล้ว (ตรวจสอบ ID ให้ตรงกัน)
            .filter(p => !billItems.some(item => Number(item.id) === Number(p.id)))
            .sort((a, b) => a.name.localeCompare(b.name, 'th'));
        }, [searchTerm, products, billItems]);

        // เพิ่มสินค้าในบิล
        const addItemToBill = (product) => {
          setBillItems(prev => {
            if (prev.find(item => item.productId === product.id)) return prev;
            return [...prev, {
              productId: product.id,
              name: product.name,
              price: product.price,
              cost: product.cost,
              qty: 1
            }];
          });
          setSearchTerm('');
        };

        // อัพเดทจำนวนสินค้าด้วยการพิมพ์
        const updateItemQtyManual = (productId, newQty) => {
          const qty = parseInt(newQty);
          const product = products.find(p => p.id === productId);
          const maxStock = product ? (product.stock || 0) : 0;

          setBillItems(prev => prev.map(item => {
            if (item.productId === productId) {
              let finalQty = isNaN(qty) || qty <= 0 ? 1 : qty;
              if (finalQty > maxStock) {
                setPopupContent({
                  title: "จำนวนเกินสต็อก",
                  message: `สต็อกสินค้า "${item.name}" มีจำกัดเพียง ${maxStock} ชิ้น`
                });
                setShowPopup(true);
                finalQty = maxStock;
              }
              return { ...item, qty: finalQty };
            }
            return item;
          }));
        };
        // อัพเดทจำนวนสินค้าด้วยปุ่ม +/-
        const updateItemQty = (productId, delta) => {
          setBillItems(prev => prev.map(item => {
            if (item.productId === productId) {
              const product = products.find(p => p.id === productId);

              // ดึงค่าจำนวนเดิมในบิลนี้ (ถ้ามี)
              const originalItem = billToEdit.items.find(i => i.productId === productId);
              const originalQty = originalItem ? originalItem.qty : 0;

              // สต็อกที่แท้จริงที่ยอมให้ใช้ได้ = สต็อกในคลัง + จำนวนที่บิลนี้ถือไว้
              const maxStock = (product ? product.stock : 0) + originalQty;

              const newQty = item.qty + delta;

              if (newQty > maxStock) {
                setPopupContent({
                  title: "สินค้าไม่พอ",
                  message: `ขออภัย สินค้า "${item.name}" ในสต็อกเหลือเพียง ${maxStock} ชิ้น`
                });
                setShowPopup(true);
                return { ...item, qty: maxStock };
              }
              return { ...item, qty: newQty < 1 ? 1 : newQty };
            }
            return item;
          }));
        };

        // ลบสินค้าออกจากบิล
        const removeItem = (productId) => {
          setBillItems(prev => prev.filter(item => item.productId !== productId));
        };

        // บันทึกการแก้ไขบิล
        const handleSaveBill = async () => {
          if (billItems.length === 0) {
            setPopupContent({ title: "ข้อผิดพลาด", message: "กรุณาเพิ่มสินค้าในบิลก่อน" });
            setShowPopup(true);
            return;
          }

          setIsSubmitting(true);
          try {
            // 1. ดึงข้อมูลบิลเดิมจากฐานข้อมูลเพื่อตรวจสอบจำนวนสินค้าก่อนหน้า
            const oldBill = bills.find(b => b.id === currentBillId);

            // 2. คืนสต็อกสินค้าเดิมทั้งหมดในบิลนี้ก่อน
            if (oldBill && oldBill.items) {
              for (const oldItem of oldBill.items) {
                const product = products.find(p => p.id === oldItem.productId);
                if (product) {
                  product.stock = (product.stock || 0) + (oldItem.qty || 0);
                  await putData(PRODUCT_STORE, product); // อัปเดตสต็อกคืนเข้าไประบบ
                }
              }
            }

            // 3. หักสต็อกสินค้าตามรายการใหม่ที่แก้ไขแล้ว
            for (const newItem of billItems) {
              const product = products.find(p => p.id === newItem.productId);
              if (product) {
                product.stock = (product.stock || 0) - (newItem.qty || 0);
                await putData(PRODUCT_STORE, product); // อัปเดตหักสต็อกใหม่ออก
              }
            }

            const subTotal = billItems.reduce((sum, item) => sum + (Number(item.price) * Number(item.qty)), 0);

            // 2. ดึงค่าส่วนลดจากตัวแปรหน้าจอ (สมมติว่าคุณมีตัวแปร totalDiscount ที่คำนวณโปรโมชั่นไว้แล้ว)
            const discountAmount = typeof totalDiscount !== 'undefined' ? totalDiscount : 0;

            // 3. คำนวณยอดขายจริงที่หักส่วนลดแล้ว (นี่คือยอดที่ต้องบันทึกลง DB)
            const finalTotalSale = subTotal - discountAmount;

            // 4. คำนวณต้นทุนรวม
            const totalCost = billItems.reduce((sum, item) => sum + (Number(item.cost || 0) * Number(item.qty)), 0);

            // 5. คำนวณกำไรสุทธิ (จากยอดที่ลดแล้ว)
            const totalProfit = finalTotalSale - totalCost;

            // 4. บันทึกข้อมูลบิลชุดใหม่ลงใน Database
            const updatedBill = {
              ...billToEdit,
              customer,
              customerDetails,
              items: billItems,
              totalSale: finalTotalSale,
              totalCost,
              totalProfit,
              date: billToEdit.date // ใช้ค่าวันที่เดิม
            };

            await putData(BILL_STORE, updatedBill);

            // ล้างข้อมูลร่างหลังเซฟสำเร็จ
            localStorage.removeItem(`edit_bill_items_${currentBillId}`);
            localStorage.removeItem(`edit_bill_customer_${currentBillId}`);
            localStorage.removeItem(`edit_bill_details_${currentBillId}`);

            setPopupContent({
              title: "บันทึกการแก้ไขสำเร็จ",
              message: `แก้ไขบิลเลขที่ ${currentBillId} เรียบร้อยแล้ว`,
              actions: [
                { label: "ปิดหน้าต่าง", handler: () => { setShowPopup(false); navigateTo('dashboard'); } },
                {
                  label: "🖨️ พิมพ์บิล",
                  primary: true,
                  handler: () => {
                    handlePrintBill(updatedBill);
                    setShowPopup(false);
                    navigateTo('dashboard');
                  }
                }
              ]
            });
            setShowPopup(true);
          } catch (e) {
            setPopupContent({ title: "ข้อผิดพลาด", message: "ไม่สามารถบันทึกการแก้ไขได้" });
            setShowPopup(true);
          } finally {
            setIsSubmitting(false);
          }
        };

        // สแกนบาร์โค้ด
        const useBarcodeScan = (onScan, isEnabled = true) => {
          const [barcodeBuffer, setBarcodeBuffer] = useState('');
          const [lastScanTime, setLastScanTime] = useState(0);

          useEffect(() => {
            if (!isEnabled) return;

            const handleKeyPress = (e) => {
              const currentTime = new Date().getTime();

              // ถ้าเวลาระหว่างการกดปุ่มห่างกันเกิน 100ms ให้เริ่มบันทึกใหม่
              if (currentTime - lastScanTime > 100) {
                setBarcodeBuffer('');
              }
              setLastScanTime(currentTime);

              // เก็บตัวอักษรที่กดเข้า buffer
              if (e.key !== 'Enter') {
                setBarcodeBuffer(prev => prev + e.key);
              } else {
                // *** [FIX] ป้องกันไม่ให้ Enter ไปกดปุ่มอื่นใน DOM ***
                e.preventDefault();
                e.stopPropagation();
                // ************************************************
                // เมื่อกด Enter ให้ส่งค่าไปยัง callback
                if (barcodeBuffer) {
                  onScan(barcodeBuffer);
                  setBarcodeBuffer('');
                }
              }
            };

            window.addEventListener('keypress', handleKeyPress);
            return () => window.removeEventListener('keypress', handleKeyPress);
          }, [barcodeBuffer, lastScanTime, onScan, isEnabled]);
        };

        const handleBarcodeScan = useCallback((barcode) => {
          const engBarcode = translateBarcode(barcode);
          console.log("raw:", barcode);
          console.log("eng:", engBarcode);
          // หาสินค้าจากบาร์โค้ด (ID)
          const product = products.find(p => {
            const customBarcode = p.barcode ? String(p.barcode).toLowerCase() : null; // ทำให้เป็นตัวพิมพ์เล็กเสมอ
            const systemId = String(p.id);

            // 1. ค้นหาจากรหัสบาร์โค้ดที่ตั้งเอง (ตัวพิมพ์เล็ก)
            const isMatchCustom = customBarcode && customBarcode === engBarcode;
            // 2. ค้นหาจาก ID สินค้าอัตโนมัติ (Fallback)
            const isMatchSystem = systemId === engBarcode;

            return isMatchCustom || isMatchSystem;
          });
          if (!product) {
            setPopupContent({
              title: "ไม่พบสินค้า",
              message: `ไม่พบสินค้าที่มีรหัสบาร์โค้ด: ${barcode}`
            });
            setShowPopup(true);
            setSearchTerm('');
            return;
          }

          // เพิ่มสินค้าลงในบิล หรือเพิ่มจำนวนถ้ามีอยู่แล้ว
          setBillItems(prev => {
            const existingItem = prev.find(item => item.productId === product.id);
            if (existingItem) {
              const nextQty = existingItem.qty + 1;

              // ตรวจสอบสต็อก: ถ้าจำนวนถัดไปเกินสต็อกที่มี
              if (nextQty > (product.stock || 0)) {
                setPopupContent({
                  title: "สินค้าในสต็อกไม่พอ",
                  message: `ไม่สามารถเพิ่ม "${product.name}" ได้แล้ว เนื่องจากในสต็อกมีเพียง ${product.stock} ชิ้น`
                });
                setShowPopup(true);
                return prev;
              }

              return prev.map(item =>
                item.productId === product.id
                  ? { ...item, qty: nextQty }
                  : item
              );
            }

            if ((product.stock || 0) <= 0) {
              setPopupContent({
                title: "สินค้าหมด",
                message: `ไม่สามารถเพิ่ม "${product.name}" ได้เนื่องจากไม่มีสินค้าในสต็อก`
              });
              setShowPopup(true);
              return prev;
            }

            return [...prev, {
              productId: product.id,
              name: product.name,
              price: product.price,
              cost: product.cost,
              qty: 1
            }];
          });
        }, [products]);

        // ใช้ hook บาร์โค้ด
        useBarcodeScan(handleBarcodeScan, true);

        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title={`✏️ แก้ไขบิลเลขที่ #${billToEdit.id}`} />
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
              {/* Left Column: Inputs & Search */}
              <div className="lg:col-span-2 space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-lg space-y-4">
                  <h3 className="text-lg font-bold text-green-700">ข้อมูลลูกค้า / ช่าง</h3>
                  <input
                    type="text"
                    placeholder="ชื่อลูกค้า / ชื่อช่าง (ไม่บังคับ)"
                    value={customer}
                    onChange={(e) => setCustomer(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />
                  <input
                    type="text"
                    placeholder="รายละเอียดลูกค้า (ไม่บังคับ)"
                    value={customerDetails}
                    onChange={(e) => setCustomerDetails(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />

                  <h3 className="text-lg font-bold text-green-700 pt-4">🔍 ค้นหาสินค้าเพื่อเพิ่มในบิล</h3>
                  <input
                    type="text"
                    placeholder="พิมพ์ชื่อสินค้า..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                  />

                  {/* Search Results Dropdown */}
                  {searchTerm && searchResults.length > 0 && (
                    <div className="bg-white border border-green-200 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                      {searchResults.map(p => (
                        <div
                          key={p.id}
                          onClick={() => addItemToBill(p)}
                          className="flex justify-between items-center p-3 cursor-pointer hover:bg-green-100 transition duration-100 border-b last:border-b-0"
                        >
                          <div className="flex flex-col">
                            <span className="font-medium text-gray-800">{p.name}</span>
                            {/* [แก้ไข] แสดงสีตามเงื่อนไข: <= 5 สีแดง, > 5 สีน้ำเงิน */}
                            <span className={`text-sm font-semibold ${p.stock <= 5 ? 'text-red-600' : 'text-blue-600'}`}>
                              คงเหลือ: {p.stock || 0} {p.unit || 'ชิ้น'}
                            </span>
                          </div>
                          <span className="text-sm font-semibold text-green-600">{formatCurrency(p.price)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Bill Items List */}
                <div className="bg-white p-6 rounded-xl shadow-lg">
                  <h3 className="text-xl font-bold text-green-700 mb-4 border-b pb-2">รายการสินค้าในบิล ({billItems.length} รายการ)</h3>
                  <div className="space-y-3">
                    {billItems.length === 0 ? (
                      <p className="text-gray-500 text-center">กรุณาเพิ่มสินค้าจากช่องค้นหาด้านบน</p>
                    ) : (
                      billItems.map(item => (
                        <div key={item.productId} className="flex items-center justify-between p-3 border border-yellow-100 rounded-lg bg-yellow-50">
                          {/* Item Name & Price */}
                          <div className="flex-1 min-w-0 pr-3">
                            <p className="font-semibold text-gray-800 truncate">{item.name}</p>
                            <p className="text-xs text-gray-500">@{formatCurrency(item.price)}</p>
                          </div>

                          {/* Quantity Control */}
                          <div className="flex items-center space-x-2">
                            <button
                              onClick={() => updateItemQty(item.productId, -1)}
                              className="p-1 w-8 h-8 flex items-center justify-center bg-gray-200 rounded-full text-gray-700 hover:bg-gray-300 transition"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" /></svg>
                            </button>
                            {/* ปรับปรุง: ใช้ input แทน span เพื่อให้แก้ไขจำนวนด้วยมือได้ */}
                            <input
                              type="number"
                              min="0"
                              value={item.qty}
                              onChange={(e) => updateItemQtyManual(item.productId, e.target.value)}
                              className="font-bold text-gray-900 w-12 text-center p-1 border rounded-md"
                            />
                            <button
                              onClick={() => updateItemQty(item.productId, 1)}
                              className="p-1 w-8 h-8 flex items-center justify-center bg-green-400 text-white rounded-full hover:bg-green-500 transition"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                            </button>
                          </div>

                          {/* Total & Remove */}
                          <div className="ml-4 w-24 text-right">
                            <p className="font-bold text-green-700">{formatCurrency(item.price * item.qty)}</p>
                          </div>
                          <button
                            onClick={() => removeItem(item.productId)}
                            className="ml-3 text-red-500 hover:text-red-700 p-1 rounded-full hover:bg-red-100 transition"
                            aria-label="Remove Item"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                          </button>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>

              {/* Right Column: Summary & Action */}
              <div className="lg:col-span-1">
                <div className="sticky top-20 bg-green-700 text-white p-6 rounded-xl shadow-2xl space-y-4">
                  <h3 className="text-2xl font-black mb-4 border-b border-green-500 pb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                    สรุปยอดรวม
                  </h3>

                  {/* ยอดรวมก่อนหักส่วนลด */}
                  <div className="flex justify-between items-center text-sm opacity-80">
                    <span>ราคารวมสินค้า</span>
                    <span>{formatCurrency(subTotal)}</span>
                  </div>

                  {/* รายการส่วนลดที่ได้รับ */}
                  {totalDiscount > 0 && (
                    <div className="space-y-1 py-3 border-y border-green-600 border-dashed">
                      <div className="text-xs font-bold text-green-300 uppercase tracking-widest">ส่วนลดโปรโมชั่น:</div>
                      {appliedPromotions.map((p, idx) => (
                        <div key={idx} className="flex justify-between text-sm text-yellow-200 italic">
                          <span>- {p.name}</span>
                          <span>{formatCurrency(p.amount)}</span>
                        </div>
                      ))}
                      <div className="flex justify-between font-bold text-yellow-300 pt-1 border-t border-green-800">
                        <span>รวมส่วนลดทั้งหมด</span>
                        <span>- {formatCurrency(totalDiscount)}</span>
                      </div>
                    </div>
                  )}

                  {/* ยอดสุทธิที่ลูกค้าต้องจ่าย */}
                  <div className="flex justify-between items-center text-xl font-black pt-2">
                    <span className="text-green-200">ยอดสุทธิ</span>
                    <span className="text-3xl text-white drop-shadow-md">{formatCurrency(totalSale)}</span>
                  </div>

                  {/* ส่วนรับเงิน */}
                  <div className="mt-6 pt-4 border-t border-green-500">
                    <label className="block text-sm font-medium mb-1 text-green-100">รับเงินมา</label>
                    <input
                      type="number"
                      value={amountReceived}
                      onChange={(e) => setAmountReceived(e.target.value)}
                      className="w-full p-3 bg-white text-gray-900 rounded-lg font-bold text-xl focus:ring-4 focus:ring-yellow-400 outline-none transition-all"
                      placeholder="ยอดเงินจากลูกค้า"
                      disabled={skipChange}
                    />
                  </div>

                  {/* แสดงเงินทอน */}
                  <div className="flex justify-between items-center text-lg bg-green-800 p-4 rounded-xl border border-green-600">
                    <span>เงินทอน</span>
                    <span className="text-yellow-300 font-black text-3xl">
                      {formatCurrency(Math.max(0, parseFloat(amountReceived || '0') - totalSale))}
                    </span>
                  </div>

                  <button
                    onClick={handleSaveBill}
                    disabled={isSubmitting || billItems.length === 0}
                    className="w-full mt-4 py-5 bg-yellow-400 text-green-900 rounded-xl font-black text-xl hover:bg-yellow-300 active:scale-95 transition-all shadow-xl disabled:bg-gray-400 disabled:text-gray-200 flex items-center justify-center border-b-4 border-yellow-600"
                  >
                    {isSubmitting ? (
                      <div className="flex items-center gap-2">
                        <svg className="animate-spin h-6 w-6 text-green-900" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        กำลังบันทึก...
                      </div>
                    ) : (
                      <span>💾 บันทึก & พิมพ์บิล</span>
                    )}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // --- 10. Bill Detail View & PDF Generation ---

      const handlePrintBill = (billData) => {
        try {
          const totalBeforeDiscount = billData.items.reduce((acc, item) => acc + (item.price * item.qty), 0);
          // 2. คำนวณหาส่วนลด (ราคารวม - ยอดขายจริง)
          const totalDiscount = totalBeforeDiscount - billData.totalSale;
          // สร้าง HTML สำหรับ PDF (A5 landscape 210mm × 148mm)
          const content = `
