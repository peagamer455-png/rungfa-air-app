<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รุ่งฟ้าแอร์ SHOP - ระบบจัดการบิลสำเร็จรูป</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
              500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d'
            }
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>

<body class="bg-gray-50">
  <div id="root">
  </div>

  <script type="text/babel">
    // *** โค้ด React/JSX/JS ทั้งหมดจาก App.jsx อยู่ด้านล่างนี้ ***

    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // --- 1. Firebase Configuration & Helpers ---
    const firebaseConfig = {
      apiKey: "AIzaSyDHXicnk7hX0W2NjQeq8JuQqKMYk9PgI8M",
      authDomain: "rungfaairshop.firebaseapp.com",
      projectId: "rungfaairshop",
      storageBucket: "rungfaairshop.firebasestorage.app",
      messagingSenderId: "345626163320",
      appId: "1:345626163320:web:c41442f08ff7683c91158d",
      measurementId: "G-ZQM08BTWJ9"
    };

    // เชื่อมต่อ Cloud
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const PRODUCT_STORE = 'products';
    const BILL_STORE = 'bills';

    // ดึงข้อมูลแบบ Real-time (เครื่องอื่นแก้ เครื่องเราเปลี่ยนทันที)
    const subscribeData = (storeName, callback) => {
      return db.collection(storeName).onSnapshot((snapshot) => {
        const data = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        callback(data);
      });
    };

    // บันทึก/แก้ไขข้อมูล (เพิ่มที่เก็บสินค้าได้เลย)
    const putData = async (storeName, data) => {
      const dataToSave = { ...data };
      Object.keys(dataToSave).forEach(key => {
        if (dataToSave[key] === undefined) {
          dataToSave[key] = ""; // ถ้าค่าไหนว่าง ให้เปลี่ยนเป็นข้อความว่างแทน
        }
      });
      const id = dataToSave.id ? String(dataToSave.id) : null;
      delete dataToSave.id;

      if (id) {
        await db.collection(storeName).doc(id).set(dataToSave, { merge: true });
        return id;
      } else {
        const docRef = await db.collection(storeName).add(dataToSave);
        return docRef.id;
      }
    };

    const deleteData = async (storeName, id) => {
      await db.collection(storeName).doc(String(id)).delete();
      return true;
    };

    // --- 2. jsPDF & autoTable CDN Loading ---
    const loadPdfLibs = () => {
      return new Promise((resolve, reject) => {
        // ถ้ามี jsPDF แล้วก็จบเลย (แต่ยังต้องเช็ค autoTable ต่อไป)
        if (window.jspdf && window.jspdf.jsPDF && typeof window.jspdf.jsPDF === 'function') {
          // ถ้า autoTable ยังไม่มี ให้พยายามโหลดปลั๊กอินต่อ
          if (typeof window.jspdf.jsPDF.prototype.autoTable === 'function' || typeof window.jspdf.jsPDF().autoTable === 'function') {
            resolve();
            return;
          }
        }

        const loadScript = (src) => new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = () => res();
          s.onerror = (e) => rej(e);
          document.head.appendChild(s);
        });

        const jspdfUrl = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        // ลงเวอร์ชัน autotable ที่เข้ากันได้กับ jspdf 2.x
        const autotableUrl = "https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js";

        // โหลดแบบเรียงลำดับ: jsPDF ก่อน แล้วค่อยโหลด autoTable
        loadScript(jspdfUrl)
          .then(() => loadScript(autotableUrl))
          .then(() => {
            // ยืนยันว่าฟังก์ชัน autoTable ถูกผูกกับ instance
            try {
              const jsPDF = window.jspdf && window.jspdf.jsPDF;
              const docTest = jsPDF ? new jsPDF() : null;
              if (docTest && typeof docTest.autoTable === 'function') {
                console.log('jsPDF and autoTable loaded.');
                resolve();
              } else {
                // บาง CDN/เวอร์ชันอาจผูกแตกต่างกัน แต่ยังคงใช้งานได้บน doc.autoTable หลังจากสร้าง instance
                console.warn('jsPDF loaded but autoTable not detected on instance yet. Proceeding anyway.');
                resolve();
              }
            } catch (err) {
              console.warn('pdf libs loaded but check failed, proceeding:', err);
              resolve();
            }
          })
          .catch(err => {
            console.error('Failed to load PDF libraries:', err);
            reject(err);
          });
      });
    };


    // --- 3. Utility Functions ---
    const formatCurrency = (amount) => {
      return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 2 }).format(amount);
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return date.toLocaleDateString('th-TH', {
        day: '2-digit', month: '2-digit', year: 'numeric'
      }) + ' ' + date.toLocaleTimeString('th-TH', {
        hour: '2-digit', minute: '2-digit'
      });
    };

    // [NEW] ฟังก์ชันสำหรับแสดงวันที่ปัจจุบันในรูปแบบภาษาไทยที่สวยงาม
    const formatThaiDate = () => {
      const date = new Date();
      // เช่น "วันศุกร์ที่ 25 ตุลาคม 2568"
      return date.toLocaleDateString('th-TH', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    };

    // --- 3.1 Store Overview Dashboard (เวอร์ชันแก้ไข Syntax และบีบแกน Y) ---
    const OverviewDashboard = ({ bills, formatCurrency, openPasswordModal, setCurrentPage }) => {
      const [timeRange, setTimeRange] = useState('month');
      const [isAuthorized, setIsAuthorized] = useState(false);
      const hasOpenedModal = useRef(false);

      useEffect(() => {
        if (!isAuthorized && !hasOpenedModal.current) {
          hasOpenedModal.current = true;
          openPasswordModal(() => setIsAuthorized(true), () => setCurrentPage('dashboard'));
        }
      }, [isAuthorized, openPasswordModal, setCurrentPage]);

      const stats = useMemo(() => {
        if (!isAuthorized) return null;

        const now = new Date();
        let labels = [];
        let chartData = [];
        let filteredBills = [];

        const getStatsForRange = (filterFn, labelArray) => {
          labels = labelArray;
          chartData = labelArray.map((_, i) => {
            const matches = bills.filter(b => filterFn(b, i));
            return {
              // ดักค่า NaN ด้วย Number() || 0
              profit: matches.reduce((sum, b) => {
                const s = Number(b.totalSale) || 0;
                const c = Number(b.totalCost) || 0;
                return sum + (s - c);
              }, 0),
              sale: matches.reduce((sum, b) => sum + (Number(b.totalSale) || 0), 0)
            };
          });
          filteredBills = bills.filter(b => labelArray.some((_, i) => filterFn(b, i)));
        };

        // --- ส่วนการเช็ค TimeRange (คงเดิม) ---
        if (timeRange === 'week') {
          const days = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
          const startOfWeek = new Date(now);
          startOfWeek.setDate(now.getDate() - now.getDay());
          startOfWeek.setHours(0, 0, 0, 0);
          getStatsForRange((b, i) => {
            const d = new Date(b.date);
            return d >= startOfWeek && d.getDay() === i;
          }, days);
        } else if (timeRange === 'month') {
          const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
          const dayLabels = Array.from({ length: daysInMonth }, (_, i) => i + 1);
          getStatsForRange((b, i) => {
            const d = new Date(b.date);
            return d.getDate() === (i + 1) && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          }, dayLabels);
        } else if (timeRange === 'quarter') {
          getStatsForRange((b, i) => {
            const d = new Date(b.date);
            return Math.floor(d.getMonth() / 3) === i && d.getFullYear() === now.getFullYear();
          }, ['Q1', 'Q2', 'Q3', 'Q4']);
        } else if (timeRange === 'year_months') {
          const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
          getStatsForRange((b, i) => {
            const d = new Date(b.date);
            return d.getMonth() === i && d.getFullYear() === now.getFullYear();
          }, months);
        } else {
          const years = Array.from({ length: 5 }, (_, i) => now.getFullYear() - 4 + i);
          getStatsForRange((b, i) => new Date(b.date).getFullYear() === years[i], years.map(y => y + 543));
        }

        const productMap = {};
        filteredBills.forEach(b => {
          (b.items || []).forEach(item => {
            const name = item.name || "ทั่วไป";
            const qty = parseFloat(item.quantity) || parseFloat(item.qty) || 0;
            const price = parseFloat(item.price) || 0;
            const cost = parseFloat(item.cost) || 0;
            if (!productMap[name]) productMap[name] = { name, qty: 0, profit: 0 };
            productMap[name].qty += qty;
            productMap[name].profit += (price - cost) * qty;
          });
        });

        const productList = Object.values(productMap);
        const maxProfit = Math.max(...chartData.map(d => d.profit), 100);

        return {
          totalSale: filteredBills.reduce((sum, b) => sum + (Number(b.totalSale) || 0), 0),
          // แก้ไขจุดที่ 1: เปลี่ยนชื่อจาก netProfit เป็น totalProfit ให้ตรงกับที่เรียกใช้ข้างล่าง
          totalProfit: filteredBills.reduce((sum, b) => {
            const s = Number(b.totalSale) || 0;
            const c = Number(b.totalCost) || 0;
            return sum + (s - c);
          }, 0),
          totalBills: filteredBills.length,
          labels,
          chartData,
          topQty: productList.sort((a, b) => b.qty - a.qty).slice(0, 5),
          topProfit: productList.sort((a, b) => b.profit - a.profit).slice(0, 5),
          maxVal: maxProfit * 1.1
        };
      }, [bills, timeRange, isAuthorized]);

      if (!isAuthorized || !stats) return null;

      return (
        <div className="p-4 lg:p-8 space-y-6 animate-fade-in bg-gray-50">
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h2 className="text-2xl font-bold text-green-700">📊 สรุปภาพรวม</h2>
            <div className="flex bg-gray-200 p-1 rounded-xl w-fit shadow-inner">
              {['week', 'month', 'quarter', 'year_months', 'year'].map(r => (
                <button key={r} onClick={() => setTimeRange(r)}
                  className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all ${timeRange === r ? 'bg-white text-green-600 shadow-sm' : 'text-gray-500'}`}>
                  {r === 'week' ? 'อาทิตย์' : r === 'month' ? 'เดือน' : r === 'quarter' ? 'ไตรมาส' : r === 'year_months' ? 'ปี' : '5ปีย้อนหลัง'}
                </button>
              ))}
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard title="รายได้รวม" value={formatCurrency(stats.totalSale)} icon="💰" color="text-blue-600" />
            <StatCard title="กำไรสุทธิ" value={formatCurrency(stats.totalProfit)} icon="💵" color="text-emerald-600" />
            <StatCard title="จำนวนบิล" value={`${stats.totalBills} ใบ`} icon="📝" color="text-orange-600" />
            <StatCard title="เฉลี่ย/บิล" value={formatCurrency(stats.totalSale / (stats.totalBills || 1))} icon="📊" color="text-purple-600" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border flex flex-col h-[450px]">
              <h3 className="text-lg font-bold mb-2 text-green-700">📈 กราฟวิเคราะห์กำไรสุทธิ</h3>

              <div className="relative mt-4 mb-8 flex-1 w-full">
                <div className="h-full flex items-end space-x-1 relative border-b-2 border-l-2 border-gray-200 pb-1 ml-12 mr-2">

                  {/* Y-Axis Labels */}
                  <div className="absolute left-[-45px] top-0 h-full flex flex-col justify-between text-[10px] text-gray-400 font-bold text-right w-[40px]">
                    <span>{Math.round(stats.maxVal).toLocaleString()}</span>
                    <span>{Math.round(stats.maxVal * 0.5).toLocaleString()}</span>
                    <span>0</span>
                  </div>

                  {/* Bars */}
                  {stats.chartData.map((data, i) => (
                    <div key={i} className="flex-1 flex flex-col items-center group relative h-full justify-end px-[1px]">

                      {/* Hover Tooltip (2 บรรทัด) */}
                      <div className="absolute bottom-full mb-2 hidden group-hover:block bg-gray-900 text-white text-[11px] py-2 px-3 rounded-lg z-30 shadow-xl whitespace-nowrap pointer-events-none ring-1 ring-white/20">
                        <div className="text-center border-b border-gray-700 mb-1 pb-1 font-bold">{stats.labels[i]}</div>
                        <div className="flex justify-between space-x-4">
                          <span className="text-gray-400">รายได้:</span>
                          <span className="font-bold">{data.sale.toLocaleString()} บ.</span>
                        </div>
                        <div className="flex justify-between space-x-4">
                          <span className="text-green-300">กำไร:</span>
                          <span className="font-bold text-green-400">{data.profit.toLocaleString()} บ.</span>
                        </div>
                      </div>

                      {/* แท่งกราฟกำไร (สีน้ำเงิน) */}
                      <div
                        className="w-full bg-green-500 rounded-t-sm transition-all duration-200 hover:bg-green-600 hover:scale-x-105 shadow-sm cursor-pointer"
                        style={{ height: `${(data.profit / stats.maxVal) * 100}%`, minHeight: data.profit > 0 ? '4px' : '0' }}
                      >
                      </div>

                      {/* X-Axis Labels */}
                      <div className="absolute top-full mt-2 w-full text-center">
                        <span className={`text-[9px] text-gray-500 font-bold block ${timeRange === 'month' ? 'rotate-45 mt-1 ml-2' : ''}`}>
                          {stats.labels[i]}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="space-y-4">
              <ProductList title="🏆 สินค้าขายดี (จำนวน)" data={stats.topQty} unit="ชิ้น" color="text-green-600" isQty={true} />
              <ProductList title="💰 กำไรสูงสุด (บาท)" data={stats.topProfit} unit="" color="text-blue-600" isQty={false} formatCurrency={formatCurrency} />
            </div>
          </div>
        </div>
      );
    };

    const ProductList = ({ title, data, unit, color, isQty, formatCurrency }) => (
      <div className="bg-white p-5 rounded-2xl shadow-sm border">
        <h3 className="text-sm font-bold text-gray-700 mb-3">{title}</h3>
        <div className="space-y-2">
          {data.length > 0 ? data.map((p, i) => (
            <div key={i} className="flex justify-between items-center text-[13px] border-b border-gray-50 pb-1">
              <span className="truncate flex-1 text-gray-600">{i + 1}. {p.name}</span>
              <span className={`font-bold ${color}`}>
                {isQty ? p.qty : formatCurrency(p.profit)} {unit}
              </span>
            </div>
          )) : <div className="text-gray-400 text-xs">ไม่มีข้อมูล</div>}
        </div>
      </div>
    );

    const StatCard = ({ title, value, icon, color }) => (
      <div className="bg-white p-6 rounded-2xl shadow-sm border flex flex-col justify-between transition-all hover:shadow-md">
        <div className="flex justify-between items-start">
          <p className="text-xl font-bold text-gray-500">{title}</p>
          <span className="text-xl">{icon}</span>
        </div>
        <div className="mt-4">
          <h3 className={`text-2xl font-black ${color}`}>{value}</h3>
        </div>
      </div>
    );

    // --- Promotion View (เวอร์ชันใช้ Popup ของระบบ) ---
    const PromotionView = ({ products, setPopupContent, setShowPopup }) => {
      const [promotions, setPromotions] = React.useState([]);
      const [formData, setFormData] = React.useState({
        name: '',
        type: 'qty',
        items: [],
        minQty: 1,
        discountPrice: ''
      });
      const [searchTerm, setSearchTerm] = React.useState('');

      const fetchPromotions = async () => {
        const data = await getAll('promotions');
        if (data) {
          const sortedData = data.sort((a, b) => a.name.localeCompare(b.name, 'th'));
          setPromotions(sortedData);
        } else {
          setPromotions([]);
        }
      };

      React.useEffect(() => {
        fetchPromotions();
      }, []);

      // ฟังก์ชันเรียกใช้งาน Popup แจ้งเตือน
      const showAppPopup = (title, message) => {
        setPopupContent({ title, message });
        setShowPopup(true);
      };

      const handleSave = async () => {
        if (!formData.name || !formData.discountPrice || formData.items.length === 0) {
          showAppPopup('⚠️ ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลให้ครบถ้วน');
          return;
        }
        await putData('promotions', { ...formData, discountPrice: Number(formData.discountPrice) });
        setFormData({ name: '', type: 'qty', items: [], minQty: 1, discountPrice: '' });
        fetchPromotions();
        showAppPopup('✅ สำเร็จ', 'บันทึกโปรโมชั่นใหม่เรียบร้อยแล้ว');
      };

      const deletePromo = async (id) => {
        setPopupContent({
          title: '❓ ยืนยันการลบ',
          message: 'คุณต้องการลบโปรโมชั่นนี้ใช่หรือไม่? การลบแล้วไม่สามารถย้อนคืนได้',
          actions: [
            {
              label: 'ยกเลิก',
              handler: () => setShowPopup(false), // เปลี่ยนจาก handler เป็น onClick
              variant: 'secondary' // สีเทา
            },
            {
              label: 'ยืนยันการลบ',
              handler: async () => { // เปลี่ยนจาก handler เป็น onClick
                try {
                  const db = await openDB();
                  const tx = db.transaction('promotions', 'readwrite');
                  await tx.objectStore('promotions').delete(id);
                  setShowPopup(false);
                  fetchPromotions();
                } catch (err) {
                  console.error(err);
                  setShowPopup(false);
                }
              },
              variant: 'danger' // ระบบจะเปลี่ยนเป็นสีแดง (bg-red-600) ให้โดยอัตโนมัติ
            }
          ]
        });
        setShowPopup(true);
      };

      const filteredProducts = products.filter(p =>
        p.name.toLowerCase().includes(searchTerm.toLowerCase())
      ).slice(0, 5);

      return (
        <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
              <h1 className="text-2xl font-bold text-gray-800">🎁 จัดการโปรโมชั่น</h1>
              <p className="text-gray-500">สร้างส่วนลดพิเศษและรายการจับคู่สินค้า</p>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-1 space-y-4">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-green-100 space-y-4">
                <h3 className="font-bold text-lg text-green-700">สร้างโปรโมชั่นใหม่</h3>

                <input
                  className="w-full border p-2 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                  placeholder="ชื่อโปรโมชั่น (เช่น ก.ชุดสุดคุ้ม)"
                  value={formData.name}
                  onChange={e => setFormData({ ...formData, name: e.target.value })}
                />

                <select
                  className="w-full border p-2 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                  value={formData.type}
                  onChange={e => setFormData({ ...formData, type: e.target.value, items: [] })}
                >
                  <option value="qty"> ซื้อครบจำนวน (Quantity)</option>
                  <option value="bundle"> จับคู่สินค้า (Bundle)</option>
                </select>

                <div className="space-y-2">
                  <label className="text-sm font-bold text-gray-600">เลือกสินค้าเข้าร่วม:</label>
                  <input
                    className="w-full border p-2 rounded-lg text-sm"
                    placeholder="ค้นหาชื่อสินค้า..."
                    onChange={e => setSearchTerm(e.target.value)}
                    value={searchTerm}
                  />
                  {searchTerm && (
                    <div className="border rounded-lg overflow-hidden bg-white shadow-lg">
                      {filteredProducts.map(p => (
                        <div
                          key={p.id}
                          className="p-2 hover:bg-green-50 cursor-pointer text-sm border-b last:border-0"
                          onClick={() => {
                            if (formData.type === 'bundle' && formData.items.length >= 2) {
                              showAppPopup('ข้อจำกัด', 'แบบจับคู่เลือกได้สูงสุด 2 อย่างครับ');
                              return;
                            }
                            if (formData.type === 'qty' && formData.items.length >= 1) {
                              showAppPopup('ข้อจำกัด', 'แบบซื้อครบจำนวนเลือกได้ 1 อย่างครับ');
                              return;
                            }
                            setFormData({ ...formData, items: [...formData.items, { id: p.id, name: p.name }] });
                            setSearchTerm('');
                          }}
                        >
                          {p.name}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="flex flex-wrap gap-2">
                  {formData.items.map((it, idx) => (
                    <span key={idx} className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs flex items-center gap-1">
                      {it.name}
                      <button onClick={() => setFormData({ ...formData, items: formData.items.filter((_, i) => i !== idx) })} className="font-bold">×</button>
                    </span>
                  ))}
                </div>

                {formData.type === 'qty' && (
                  <div>
                    <label className="text-xs text-gray-500">จำนวนที่ต้องซื้อถึงจะได้ส่วนลด</label>
                    <input
                      type="number"
                      className="w-full border p-2 rounded-lg"
                      placeholder="จำนวนขั้นต่ำ (เช่น 3 ชิ้น)"
                      value={formData.minQty}
                      onChange={e => setFormData({ ...formData, minQty: Number(e.target.value) })}
                    />
                  </div>
                )}

                <div>
                  <label className="text-xs text-gray-500">ราคารวมพิเศษหลังหักส่วนลด</label>
                  <input
                    type="number"
                    className="w-full border p-2 rounded-lg font-bold text-green-600"
                    placeholder="ราคาพิเศษ (บาท)"
                    value={formData.discountPrice}
                    onChange={e => setFormData({ ...formData, discountPrice: e.target.value })}
                  />
                </div>

                <button
                  onClick={handleSave}
                  className="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition shadow-md"
                >
                  บันทึกโปรโมชั่น
                </button>
              </div>
            </div>

            <div className="lg:col-span-2">
              <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table className="w-full text-left">
                  <thead className="bg-gray-50 border-b text-gray-600">
                    <tr>
                      <th className="p-4">ชื่อโปรโมชั่น</th>
                      <th className="p-4">เงื่อนไข</th>
                      <th className="p-4 text-right">ราคาพิเศษ</th>
                      <th className="p-4"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {promotions.length > 0 ? promotions.map(promo => (
                      <tr key={promo.id} className="border-b last:border-0 hover:bg-gray-50 transition">
                        <td className="p-4">
                          <div className="font-bold text-gray-800">{promo.name}</div>
                        </td>
                        <td className="p-4">
                          <div className="text-sm">
                            {promo.type === 'bundle' ? ' จับคู่:' : ` ซื้อ ${promo.minQty} ชิ้น:`}
                          </div>
                          <div className="text-xs text-blue-600 font-medium">
                            {promo.items.map(it => it.name).join(' + ')}
                          </div>
                        </td>
                        <td className="p-4 text-right font-bold text-green-600">
                          {promo.discountPrice.toLocaleString()} ฿
                        </td>
                        <td className="p-4 text-right">
                          <button onClick={() => deletePromo(promo.id)} className="text-red-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-full transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                          </button>
                        </td>
                      </tr>
                    )) : (
                      <tr>
                        <td colSpan="4" className="p-10 text-center text-gray-400">ยังไม่มีข้อมูลโปรโมชั่น</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 4. Main App Component ---

    const App = () => {
      const translateBarcode = (text) => {
        if (!text) return '';

        // 1. Map ตัวอักษรไทยตามที่ท่านกำหนด
        const map = {
          'ๅ': '1', '/': '2', '-': '3', 'ภ': '4', 'ถ': '5', 'ุ': '6', 'ึ': '7', 'ค': '8', 'ต': '9', 'จ': '0',
          'ข': '-', 'ช': '=',
          '+': '1', '๑': '2', '๒': '3', '๓': '4', '๔': '5', 'ู': '6', '฿': '7', '๕': '8', '๖': '9', '๗': '0',
        };

        // 2. แปลงค่าตาม Map
        let result = [...text].map(c => map[c] || c).join('');

        // 3. จัดการอักขระที่ไม่จำเป็นและจัดรูปแบบ
        return result.replace(/[^A-Za-z0-9-]/g, '') // กรองเหลือแค่ A-Z, a-z, 0-9, และขีดกลาง (-)
          .trim()                      // ลบช่องว่างหัวท้ายที่อาจมาจากเครื่องสแกน
          .toLowerCase();              // แปลงเป็นตัวพิมพ์เล็กทั้งหมดเพื่อป้องกันปัญหา Case Sensitivity
      };
      // State for Navigation and Data
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [products, setProducts] = useState([]);
      const [bills, setBills] = useState([]);
      const [isDbReady, setIsDbReady] = useState(false);
      const [currentBillId, setCurrentBillId] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [showPopup, setShowPopup] = useState(false);
      const [popupContent, setPopupContent] = useState(null);
      // --- Sensitive display (กำไร/ต้นทุน) ---
      const [sensitiveVisible, setSensitiveVisible] = useState(false);
      const SENSITIVE_PASSWORD = '261250'; // <-- เปลี่ยนรหัสตรงนี้ตามต้องการ

      // --- Replace all prompt() with modal-based password confirm ---
      const [showPasswordModal, setShowPasswordModal] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordVisible, setPasswordVisible] = useState(false);
      const [passwordError, setPasswordError] = useState('');
      const passwordOnSuccessRef = useRef(null);
      const passwordInputRef = useRef(null);

      const openPasswordModal = (onSuccess) => {
        passwordOnSuccessRef.current = onSuccess;
        setPasswordInput('');
        setPasswordVisible(false);
        setPasswordError('');
        setShowPasswordModal(true);
        // focus will happen in modal mount effect
      };

      const PasswordConfirmModal = () => {
        useEffect(() => {
          setTimeout(() => passwordInputRef.current?.focus(), 50);
        }, []);

        const verify = () => {
          if (passwordInput === SENSITIVE_PASSWORD) {
            // call stored callback (if any)
            try { passwordOnSuccessRef.current && passwordOnSuccessRef.current(); } catch (e) { console.error(e); }
            setShowPasswordModal(false);
            setPasswordInput('');
            setPasswordVisible(false);
            setPasswordError('');
          } else {
            setPasswordError('รหัสไม่ถูกต้อง กรุณาลองใหม่');
          }
        };

        return (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
              <div className="flex items-center justify-center mb-4">
                <div className="bg-gray-100 rounded-full p-3">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="size-6">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                  </svg>
                </div>
              </div>
              <h3 className="text-xl font-bold text-center text-gray-900 mb-2">กรุณาใส่รหัส</h3>
              <p className="text-gray-600 text-center mb-4">กรุณาใส่รหัสเพื่อยืนยันการกระทำ</p>

              <div className="mb-4">
                <label className="block text-sm font-medium text-gray-700 mb-2">รหัส</label>
                <div className="relative">
                  <input
                    ref={passwordInputRef}
                    type={passwordVisible ? "text" : "password"}
                    value={passwordInput}
                    onChange={(e) => { setPasswordInput(e.target.value); setPasswordError(''); }}
                    className="w-full p-3 pr-10 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"
                    placeholder="ใส่รหัสยืนยัน"
                    onKeyDown={(e) => { if (e.key === 'Enter') verify(); }}
                  />
                  <button
                    type="button"
                    onClick={() => { setPasswordVisible(v => !v); setTimeout(() => passwordInputRef.current?.focus(), 0); }}
                    className="absolute inset-y-0 right-0 pr-3 flex items-center"
                    aria-label="Toggle password visibility"
                  >
                    {passwordVisible ? (
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.03-3.274M6.1 6.1A9.95 9.95 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.015 10.015 0 01-4.53 5.29M3 3l18 18" />
                      </svg>
                    ) : (
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                    )}
                  </button>
                </div>
                {passwordError && <p className="mt-2 text-sm text-red-600">{passwordError}</p>}
              </div>

              <div className="flex justify-end space-x-3">
                <button
                  onClick={() => { setShowPasswordModal(false); setPasswordInput(''); setPasswordError(''); setPasswordVisible(false); }}
                  className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300"
                >
                  ยกเลิก
                </button>
                <button
                  onClick={verify}
                  className="px-4 py-2 bg-green-500 text-white rounded-lg font-semibold hover:bg-green-600"
                >
                  ยืนยัน
                </button>
              </div>
            </div>
          </div>
        );
      };
      // --- end password modal ---

      const requestPasswordAndToggle = () => {
        if (sensitiveVisible) {
          setSensitiveVisible(false);
          return;
        }
        // open modal instead of prompt
        openPasswordModal(() => setSensitiveVisible(true));
      };

      const displayMaybeMasked = (value, mask = false) => {
        if (!mask) return formatCurrency(value);
        return sensitiveVisible ? formatCurrency(value) : 'xxxx';
      };

      // --- Data Fetching and Initialization ---
      const loadData = useCallback(async () => {
        try {
          await loadPdfLibs(); // โหลด library สำหรับ PDF

          // ดึงข้อมูลครั้งแรกจาก Firebase มาใส่ใน State
          const productSnapshot = await db.collection(PRODUCT_STORE).get();
          const loadedProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

          const billSnapshot = await db.collection(BILL_STORE).get();
          const loadedBills = billSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

          setProducts(loadedProducts);
          // เรียงบิลตามวันที่ล่าสุด
          setBills(loadedBills.sort((a, b) => new Date(b.date) - new Date(a.date)));

          setIsDbReady(true); // เปลี่ยนสถานะเป็นโหลดเสร็จแล้ว
          console.log('Firebase data loaded successfully.');
        } catch (e) {
          console.error("Initial data load failed:", e);
          setPopupContent({
            title: "ข้อผิดพลาด",
            message: "ไม่สามารถดึงข้อมูลจาก Cloud ได้ กรุณาเช็คอินเทอร์เน็ตหรือ Firebase Rules"
          });
          setShowPopup(true);
          setIsDbReady(true);
        }
      }, []);

      // เรียกใช้งาน loadData ทันทีเมื่อเปิดแอป
      useEffect(() => {
        loadData();

        // ส่วนของการดักฟังแบบ Real-time (มีอยู่แล้ว)
        const unsubProducts = subscribeData(PRODUCT_STORE, (data) => setProducts(data));
        const unsubBills = subscribeData(BILL_STORE, (data) => setBills(data));

        return () => {
          unsubProducts();
          unsubBills();
        };
      }, [loadData]);

      useEffect(() => {
        loadPdfLibs();

        const unsubProducts = subscribeData(PRODUCT_STORE, (data) => setProducts(data));
        const unsubBills = subscribeData(BILL_STORE, (data) => setBills(data));

        return () => {
          unsubProducts();
          unsubBills();
        };
      }, []);

      // ปิด autocomplete / คำแนะนำของเบราว์เซอร์ สำหรับ form / input / textarea
      useEffect(() => {
        const disableAuto = () => {
          document.querySelectorAll('form, input, textarea').forEach(el => {
            try {
              el.setAttribute('autocomplete', 'off');
              el.setAttribute('autocorrect', 'off');
              el.setAttribute('autocapitalize', 'off');
              el.setAttribute('spellcheck', 'false');
              // ถ้าไม่มี name บางเบราว์เซอร์จะยัง autofill -> ใส่ name ชั่วคราวแบบสุ่ม
              if (el.tagName.toLowerCase() === 'input' && !el.getAttribute('name')) {
                el.setAttribute('name', `noautofill_${Math.random().toString(36).slice(2, 8)}`);
              }
            } catch (e) { /* ignore */ }
          });
        };

        // เรียกทันทีและเฝ้าดูการเปลี่ยนแปลง DOM เพื่อให้ attribute ถูกตั้งกับ elements ที่ถูกสร้างภายหลัง
        disableAuto();
        const mo = new MutationObserver(disableAuto);
        mo.observe(document.body, { childList: true, subtree: true });

        return () => mo.disconnect();
      }, []);

      // --- Helper State for Current Day Bills ---
      const today = useMemo(() => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d.getTime();
      }, []);

      const todayBills = useMemo(() => {
        return bills.filter(bill => new Date(bill.date).getTime() >= today);
      }, [bills, today]);

      const dailySummary = useMemo(() => {
        return todayBills.reduce((acc, bill) => {
          acc.totalSale += bill.totalSale;
          acc.totalCost += bill.totalCost;
          acc.totalProfit += bill.totalProfit;
          return acc;
        }, { totalSale: 0, totalCost: 0, totalProfit: 0 });
      }, [todayBills]);

      // --- Global Navigation & Actions ---

      const navigateTo = (page, billId = null) => {
        setCurrentBillId(billId);
        setCurrentPage(page);
        setIsSidebarOpen(false); // Close sidebar on mobile
      };

      const showBillDetails = (billId) => {
        setCurrentBillId(billId);
        setCurrentPage('billDetail');
      };

      // --- 5. Shared UI Components ---

      const LoadingSpinner = () => (
        <div className="flex justify-center items-center h-screen bg-gray-50">
          <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-green-500"></div>
          <p className="ml-4 text-green-700 font-semibold">กำลังโหลดข้อมูล...</p>
        </div>
      );

      const Header = ({ title }) => (
        <header className="flex items-center justify-between p-4 bg-white shadow-md sticky top-0 z-10">
          <div className="flex items-center">
            <button
              onClick={() => setIsSidebarOpen(!isSidebarOpen)}
              className="p-2 mr-3 text-green-600 rounded-full hover:bg-green-100 transition duration-150 lg:hidden"
              aria-label="Toggle Menu"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <h1 className="text-2xl font-bold text-green-700">{title}</h1>
          </div>
          <div className="flex items-center space-x-2">
            {/* ปรับสไตล์ให้เหมือนปุ่มเคลียร์ประวัติ (ขนาดเล็กลง) */}
            <button
              onClick={requestPasswordAndToggle}
              title={sensitiveVisible ? 'ซ่อนยอดกำไร/ต้นทุน' : 'แสดงยอดกำไร/ต้นทุน'}
              className={`px-3 py-2 rounded-lg text-sm flex items-center space-x-2 transition ${sensitiveVisible ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                }`}
              aria-pressed={sensitiveVisible}
            >
              <span className="sr-only">{sensitiveVisible ? 'ซ่อนยอด' : 'แสดงยอด'}</span>
              {sensitiveVisible ? (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.03-3.274M6.1 6.1A9.95 9.95 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.015 10.015 0 01-4.53 5.29M3 3l18 18" /></svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              )}
            </button>
          </div>
        </header>
      );

      const FloatingActionButton = ({ onClick, label }) => (
        <button
          onClick={onClick}
          aria-label={label}
          className="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 w-14 h-14 bg-green-500 text-white rounded-full shadow-lg hover:bg-green-600 transition-all duration-300 transform hover:scale-110 flex items-center justify-center text-3xl font-light z-30"
        >
          +
        </button>
      );

      const ModalPopup = ({ title, message, onClose, actions }) => (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
            <h3 className="text-xl font-bold text-green-700 mb-4 border-b pb-2">{title}</h3>
            <p className="text-gray-700 mb-6">{message}</p>
            <div className="flex justify-end space-x-3">
              {actions && actions.map((action, index) => (
                <button
                  key={index}
                  onClick={() => { action.handler(); onClose(); }}
                  className={`px-4 py-2 rounded-lg font-semibold transition duration-200 ${action.variant === 'danger'
                    ? 'bg-red-500 text-white hover:bg-red-600' // สีแดงสำหรับลบ
                    : action.primary
                      ? 'bg-green-500 text-white hover:bg-green-600'
                      : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                    }`}
                >
                  {action.label}
                </button>
              ))}
              {!actions && (
                <button
                  onClick={onClose}
                  className="px-4 py-2 rounded-lg font-semibold bg-gray-200 text-gray-700 hover:bg-gray-300 transition duration-200"
                >
                  ปิด
                </button>
              )}
            </div>
          </div>
        </div>
      );

      // --- 6. Sidebar Component (In-File) ---
      const Sidebar = () => {
        const menuItems = [
          { id: 'dashboard', label: '🏠 Dashboard (หน้าหลัก)' },
          // [NEW] ประวัติบิลทั้งหมด
          { id: 'billHistory', label: '📜 ประวัติบิลทั้งหมด' },
          { id: 'promotions', label: '🎁 จัดการโปรโมชั่น' },
          { id: 'manageProducts', label: '📦 จัดการสินค้า' },
          { id: 'overview', label: '📊 สรุปภาพรวมร้านค้า' },
        ];

        return (
          <div className={`fixed inset-y-0 left-0 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out z-40`}>
            {/* Overlay for mobile */}
            {isSidebarOpen && (
              <div className="fixed inset-0 bg-black opacity-30 lg:hidden" onClick={() => setIsSidebarOpen(false)}></div>
            )}
            <aside className={`w-64 h-full bg-green-50 text-green-800 shadow-xl p-4 flex flex-col`}>
              <div className="text-2xl font-black text-green-700 mb-8 mt-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 mr-2" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 13a2 2 0 002 2h12a2 2 0 002-2v-2a1 1 0 10-2 0v2H4v-2a1 1 0 10-2 0v2z" /></svg>
                <span className='font-inter'>รุ่งฟ้าแอร์</span>
              </div>
              <nav className="space-y-2">
                {menuItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => navigateTo(item.id)}
                    className={`w-full flex items-center p-3 rounded-lg transition duration-150 ${currentPage === item.id
                      ? 'bg-green-200 text-green-800 font-bold shadow-sm'
                      : 'text-green-600 hover:bg-green-100'
                      }`}
                  >
                    {item.icon}
                    <span className="ml-3">{item.label}</span>
                  </button>
                ))}
              </nav>
            </aside>
          </div>
        );
      };

      // --- 7.5. Reusable Bill Card Component for History ---
      const HistoryBillCard = ({ bill }) => {
        const handleDelete = async () => {
          setPopupContent({
            title: "ยืนยันการลบบิล",
            message: `คุณต้องการลบบิลเลขที่ ${bill.id} หรือไม่? ระบบจะคืนสินค้าเข้าสต็อกโดยค้นหาจาก "ชื่อสินค้า"`,
            actions: [
              { label: "ยกเลิก", handler: () => { setShowPopup(false); } },
              {
                label: "ลบและคืนสต็อก",
                primary: true,
                handler: async () => {
                  try {
                    // 1. วนลูปรายการสินค้าที่มีอยู่ในบิล (bill.items)
                    if (bill.items && bill.items.length > 0) {
                      for (const item of bill.items) {

                        // ค้นหาสินค้าในสต็อก (products) ที่มีชื่อตรงกับในบิล (item.name)
                        // ใช้ .trim() เพื่อตัดช่องว่างที่อาจหลงมาจากการพิมพ์หรือ Import
                        const currentProd = products.find(p =>
                          String(p.name).trim() === String(item.name).trim()
                        );

                        if (currentProd) {
                          // ตัวแปรในไฟล์คุณ: 
                          // จำนวนขาย = item.quantity
                          // จำนวนสต็อกปัจจุบัน = currentProd.stock
                          const refundQty = Number(item.qty) || 0;
                          const currentStock = Number(currentProd.stock) || 0;
                          const newStock = currentStock + refundQty;

                          // อัปเดตกลับฐานข้อมูลโดยใช้ id ของสินค้าตัวที่หาเจอ
                          await putData(PRODUCT_STORE, {
                            ...currentProd,
                            stock: newStock
                          });
                          console.log(`คืนสต็อกชื่อ: ${item.name} | เดิม: ${currentStock} | คืน: ${refundQty} | ใหม่: ${newStock}`);
                        } else {
                          console.warn(`หาชื่อสินค้า "${item.name}" ไม่เจอในสต็อก`);
                        }
                      }
                    }

                    // 2. ลบบิลออกจากฐานข้อมูล (BILL_STORE)
                    await deleteData(BILL_STORE, bill.id);

                    setPopupContent({
                      title: "สำเร็จ",
                      message: `ลบบิลเรียบร้อยและคืนสต็อกสินค้าที่ชื่อตรงกันให้แล้ว`
                    });
                    setShowPopup(true);
                  } catch (error) {
                    console.error("Delete Error:", error);
                    setPopupContent({
                      title: "ข้อผิดพลาด",
                      message: "เกิดปัญหา: " + error.message
                    });
                    setShowPopup(true);
                  }
                }
              }
            ]
          });
          setShowPopup(true);
        };

        return (
          <div className="bg-white p-4 rounded-xl shadow-md border-l-4 border-green-400 flex justify-between items-center transition duration-200 hover:shadow-lg">
            <div className="flex-1 min-w-0">
              <div className="text-sm font-semibold text-gray-500">
                {formatDate(bill.date)}
              </div>
              <h4 className="text-lg font-bold text-gray-700 truncate">บิลที่: #{bill.id}</h4>
              <p className="text-sm text-gray-600 truncate">ลูกค้า/ช่าง: {bill.customer || 'ไม่ระบุ'}</p>
            </div>
            <div className="flex space-x-2 ml-4">
              <button
                onClick={() => showBillDetails(bill.id)}
                className="p-2 bg-green-100 text-green-600 rounded-full hover:bg-green-200"
                aria-label="View Details"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7a10.015 10.015 0 01-4.53 5.29M3 3l18 18" /></svg>
              </button>
              <button
                onClick={handleDelete}
                className="p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200"
                aria-label="Delete Bill"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </div>
          </div>
        );
      };

      // --- 7.6. Bill History View (New Component) ---
      const BillHistoryView = () => {
        const [filterTerm, setFilterTerm] = useState('');
        const [dateFrom, setDateFrom] = useState('');
        const [dateTo, setDateTo] = useState('');
        // เพิ่ม state สำหรับ pagination
        const [currentPage, setCurrentPage] = useState(1);
        const billsPerPage = 15;

        // [NEW] State สำหรับยืนยันการลบประวัติ
        const [showClearConfirm, setShowClearConfirm] = useState(false);
        const [clearPassword, setClearPassword] = useState('');
        const [clearError, setClearError] = useState('');
        // แก้ไข state สำหรับแสดง/ซ่อนรหัส
        const [clearPasswordVisible, setClearPasswordVisible] = useState(false);

        const filteredBills = useMemo(() => {
          let list = bills;
          if (filterTerm) {
            const lowerFilter = filterTerm.toString().toLowerCase();
            list = list.filter(bill => {
              if (bill.id && bill.id.toString().includes(lowerFilter)) return true;
              if (bill.customer && bill.customer.toLowerCase().includes(lowerFilter)) return true;
              if (bill.items && bill.items.some(item => item.name.toLowerCase().includes(lowerFilter))) return true;
              return false;
            });
          }

          if (dateFrom || dateTo) {
            const start = dateFrom ? new Date(dateFrom) : null;
            const end = dateTo ? new Date(dateTo) : null;
            if (start) start.setHours(0, 0, 0, 0);
            if (end) end.setHours(23, 59, 59, 999);
            list = list.filter(bill => {
              const t = new Date(bill.date).getTime();
              if (start && t < start.getTime()) return false;
              if (end && t > end.getTime()) return false;
              return true;
            });
          }

          return list;
        }, [bills, filterTerm, dateFrom, dateTo]);

        // คำนวณจำนวนหน้าทั้งหมด
        const totalPages = Math.ceil(filteredBills.length / billsPerPage);

        // ดึงรายการสำหรับหน้าปัจจุบัน
        const currentBills = useMemo(() => {
          const startIndex = (currentPage - 1) * billsPerPage;
          return filteredBills.slice(startIndex, startIndex + billsPerPage);
        }, [filteredBills, currentPage]);

        // component สำหรับปุ่ม pagination
        const Pagination = () => {
          const maxPageButtons = 5; // จำนวนปุ่มตัวเลขที่จะแสดง
          let startPage = Math.max(1, currentPage - Math.floor(maxPageButtons / 2));
          let endPage = Math.min(totalPages, startPage + maxPageButtons - 1);

          // ปรับ startPage ถ้า endPage ชนขอบ
          if (endPage - startPage + 1 < maxPageButtons) {
            startPage = Math.max(1, endPage - maxPageButtons + 1);
          }

          return (
            <div className="flex justify-center items-center space-x-2 mt-6">
              {/* ปุ่มก่อนหน้า */}
              <button
                onClick={() => setCurrentPage(page => Math.max(1, page - 1))}
                disabled={currentPage === 1}
                className="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:text-gray-400"
              >
                ←
              </button>

              {/* ปุ่มหน้าแรก */}
              {startPage > 1 && (
                <>
                  <button
                    onClick={() => setCurrentPage(1)}
                    className={`px-3 py-1 rounded-lg ${currentPage === 1 ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
                  >
                    1
                  </button>
                  {startPage > 2 && <span className="px-2">...</span>}
                </>
              )}

              {/* ปุ่มตัวเลขหน้า */}
              {Array.from({ length: endPage - startPage + 1 }, (_, i) => startPage + i).map(page => (
                <button
                  key={page}
                  onClick={() => setCurrentPage(page)}
                  className={`px-3 py-1 rounded-lg ${currentPage === page ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'
                    }`}
                >
                  {page}
                </button>
              ))}

              {/* ปุ่มหน้าสุดท้าย */}
              {endPage < totalPages && (
                <>
                  {endPage < totalPages - 1 && <span className="px-2">...</span>}
                  <button
                    onClick={() => setCurrentPage(totalPages)}
                    className={`px-3 py-1 rounded-lg ${currentPage === totalPages ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
                  >
                    {totalPages}
                  </button>
                </>
              )}

              {/* ปุ่มถัดไป */}
              <button
                onClick={() => setCurrentPage(page => Math.min(totalPages, page + 1))}
                disabled={currentPage === totalPages}
                className="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:text-gray-400"
              >
                →
              </button>
            </div>
          );
        };

        // ฟังก์ชันสำหรับเคลียร์ประวัติบิล
        const handleClearHistory = async () => {
          if (clearPassword !== SENSITIVE_PASSWORD) {
            setClearError('รหัสไม่ถูกต้อง กรุณาลองใหม่');
            return;
          }

          try {
            // ดึงบิลทั้งหมดที่จะลบตามเงื่อนไขการกรอง
            const billsToDelete = filteredBills;

            // ลบทีละรายการ
            for (const bill of billsToDelete) {
              await deleteData(BILL_STORE, bill.id);
            }

            // ปิด modal และรีเซ็ตค่า
            setShowClearConfirm(false);
            setClearPassword('');
            setClearError('');

            // แสดงข้อความสำเร็จ
            setPopupContent({
              title: "สำเร็จ",
              message: `ลบประวัติบิลทั้งหมด ${billsToDelete.length} รายการเรียบร้อยแล้ว`
            });
            setShowPopup(true);

          } catch (error) {
            console.error("Error clearing history:", error);
            setPopupContent({
              title: "เกิดข้อผิดพลาด",
              message: "ไม่สามารถลบประวัติบิลได้ กรุณาลองใหม่อีกครั้ง"
            });
            setShowPopup(true);
          }
        };

        // Modal สำหรับยืนยันการเคลียร์ประวัติ
        const ClearHistoryModal = () => {
          const inputRef = useRef(null);

          useEffect(() => {
            // focus เมื่อ modal mount
            if (inputRef.current) {
              setTimeout(() => inputRef.current.focus(), 50);
            }
          }, []);

          return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 animate-fade-in-up">
                <div className="flex items-center justify-center mb-4">
                  <div className="bg-red-100 rounded-full p-3">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                  </div>
                </div>
                <h3 className="text-xl font-bold text-center text-gray-900 mb-4">ยืนยันการเคลียร์ประวัติบิล</h3>
                <p className="text-gray-600 text-center mb-6">
                  คุณกำลังจะลบประวัติบิลทั้งหมด {filteredBills.length} รายการ
                  <br />การกระทำนี้ไม่สามารถยกเลิกได้
                </p>

                <div className="mb-4">
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    กรุณาใส่รหัสเพื่อยืนยัน:
                  </label>
                  <div className="relative">
                    <input
                      ref={inputRef}
                      type={clearPasswordVisible ? "text" : "password"}
                      value={clearPassword}
                      onChange={(e) => {
                        setClearPassword(e.target.value);
                        setClearError('');
                      }}
                      className="w-full p-3 pr-10 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500"
                      placeholder="ใส่รหัสยืนยัน"
                    />
                    <button
                      type="button"
                      onClick={() => {
                        setClearPasswordVisible(v => !v);
                        // refocus input หลัง toggle เพื่อไม่ให้ต้องคลิกใหม่
                        setTimeout(() => { inputRef.current?.focus(); }, 0);
                      }}
                      className="absolute inset-y-0 right-0 pr-3 flex items-center"
                      aria-label="Toggle password visibility"
                    >
                      {clearPasswordVisible ? (
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 012.03-3.274M6.1 6.1A9.95 9.95 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.015 10.015 0 01-4.53 5.29M3 3l18 18" />
                        </svg>
                      ) : (
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                      )}
                    </button>
                  </div>
                  {clearError && (
                    <p className="mt-2 text-sm text-red-600">{clearError}</p>
                  )}
                </div>

                <div className="flex justify-end space-x-3">
                  <button
                    onClick={() => {
                      setShowClearConfirm(false);
                      setClearPassword('');
                      setClearError('');
                      setClearPasswordVisible(false);
                    }}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300"
                  >
                    ยกเลิก
                  </button>
                  <button
                    onClick={handleClearHistory}
                    className="px-4 py-2 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600"
                  >
                    ยืนยันการลบ
                  </button>
                </div>
              </div>
            </div>
          );
        };

        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title="📜 ประวัติบิลทั้งหมด" />

            {/* Search + date filter area */}
            <div className="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
              <div className="md:col-span-2">
                <input
                  type="text"
                  placeholder="🔍 ค้นหาบิลด้วยเลขที่, ชื่อลูกค้า, หรือชื่อสินค้า..."
                  value={filterTerm}
                  onChange={(e) => {
                    setFilterTerm(e.target.value);
                    setCurrentPage(1); // รีเซ็ตหน้าเมื่อค้นหา
                  }}
                  className="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500"
                />
              </div>

              <div className="flex space-x-2">
                <input
                  type="date"
                  value={dateFrom}
                  onChange={(e) => { setDateFrom(e.target.value); setCurrentPage(1); }}
                  className="w-full p-2 border border-gray-300 rounded-lg"
                  title="จากวันที่"
                />
                <input
                  type="date"
                  value={dateTo}
                  onChange={(e) => { setDateTo(e.target.value); setCurrentPage(1); }}
                  className="w-full p-2 border border-gray-300 rounded-lg"
                  title="ถึงวันที่"
                />
              </div>
            </div>

            {/* ปุ่มเคลียร์ประวัติ เลื่อนลงมาและชิดขวา */}
            <div className="mt-3 flex justify-end">
              <button
                onClick={() => setShowClearConfirm(true)}
                className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm flex items-center"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                เคลียร์ประวัติบิล
              </button>
            </div>

            <div className="mt-6">
              <h2 className="text-xl font-bold text-green-700">
                รายการบิลทั้งหมด ({filteredBills.length} บิล)
                <span className="text-sm font-normal text-gray-500 ml-2">
                  แสดง {(currentPage - 1) * billsPerPage + 1} - {Math.min(currentPage * billsPerPage, filteredBills.length)} รายการ
                </span>
              </h2>

              <div className="space-y-3 mt-4">
                {currentBills.length > 0 ? (
                  currentBills.map(bill => <HistoryBillCard key={bill.id} bill={bill} />)
                ) : (
                  <div className="bg-white p-6 rounded-xl shadow-md text-center text-gray-500">
                    ไม่พบบิลตามเงื่อนไขที่ค้นหา
                  </div>
                )}
              </div>

              {filteredBills.length > billsPerPage && <Pagination />}
            </div>

            {/* แสดง Modal เมื่อกดปุ่มเคลียร์ประวัติ */}
            {showClearConfirm && <ClearHistoryModal />}
          </div>
        );
      };

      // --- 7. Dashboard View ---

      const DashboardView = () => {
        // BillCard ถูกย้ายมาเป็น component ภายใน DashboardView เพื่อให้สามารถใช้ props ภายในได้
        const BillCard = ({ bill }) => {
          const billDate = new Date(bill.date);
          const isToday = billDate.getTime() >= today;

          const handleDelete = async () => {
            setPopupContent({
              title: "ยืนยันการลบบิล",
              message: `คุณต้องการลบบิลเลขที่ ${bill.id} หรือไม่? ระบบจะคืนสินค้าเข้าสต็อกโดยค้นหาจาก "ชื่อสินค้า"`,
              actions: [
                { label: "ยกเลิก", handler: () => { setShowPopup(false); } },
                {
                  label: "ลบและคืนสต็อก",
                  primary: true,
                  handler: async () => {
                    try {
                      // 1. วนลูปรายการสินค้าในบิล (bill.items)
                      if (bill.items && bill.items.length > 0) {
                        for (const item of bill.items) {

                          // ค้นหาสินค้าในสต็อกที่ชื่อตรงกัน
                          const currentProd = products.find(p =>
                            String(p.name).trim() === String(item.name).trim()
                          );

                          if (currentProd) {
                            // *** จุดสำคัญ: ในไฟล์คุณใช้ item.qty (ไม่ใช่ item.quantity) ***
                            const refundQty = Number(item.qty) || 0;
                            const currentStock = Number(currentProd.stock) || 0;
                            const newStock = currentStock + refundQty;

                            // อัปเดตกลับฐานข้อมูล
                            await putData(PRODUCT_STORE, {
                              ...currentProd,
                              stock: newStock
                            });

                            console.log(`คืนสต็อกชื่อ: ${item.name} | เดิม: ${currentStock} | คืน: ${refundQty} | ใหม่: ${newStock}`);
                          }
                        }
                      }

                      // 2. ลบบิล
                      await deleteData(BILL_STORE, bill.id);

                      setPopupContent({
                        title: "สำเร็จ",
                        message: `ลบบิลเรียบร้อยและคืนสต็อกสินค้าให้แล้ว`
                      });
                      setShowPopup(true);
                    } catch (error) {
                      console.error("Delete Error:", error);
                      setPopupContent({ title: "ข้อผิดพลาด", message: "เกิดปัญหา: " + error.message });
                      setShowPopup(true);
                    }
                  }
                }
              ]
            });
            setShowPopup(true);
          };

          return (
            <div className="bg-white p-4 rounded-xl shadow-md border-l-4 border-green-400 flex justify-between items-center transition duration-200 hover:shadow-lg">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-gray-500">
                  {isToday ? 'บิลวันนี้' : formatDate(bill.date)}
                </div>
                <h4 className="text-lg font-bold text-green-700 truncate">บิลที่: #{bill.id}</h4>
                <p className="text-sm text-gray-600 truncate">ลูกค้า/ช่าง: {bill.customer || 'ไม่ระบุ'}</p>
                {/* *** แก้ไข: ลบการแสดงกำไรออกจากหน้า Dashboard ตามคำขอ ***
                    <p className="text-sm font-bold text-red-500">กำไร: {formatCurrency(bill.totalProfit)}</p>
                    */}
              </div>
              <div className="flex space-x-2 ml-4">
                <button
                  onClick={() => showBillDetails(bill.id)}
                  className="p-2 bg-green-100 text-green-600 rounded-full hover:bg-green-200"
                  aria-label="View Details"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7a10.015 10.015 0 01-4.53 5.29M3 3l18 18" /></svg>
                </button>
                <button
                  onClick={handleDelete}
                  className="p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200"
                  aria-label="Delete Bill"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
              </div>
            </div>
          );
        };

        const SummaryCard = ({ title, value, colorClass, icon, mask = false }) => (
          <div className={`bg-white p-5 rounded-xl shadow-lg border-b-4 ${colorClass}`}>
            <div className="flex items-center justify-between">
              <div className="text-sm font-medium text-gray-500">{title}</div>
              <div className={`p-2 rounded-full ${colorClass.replace('border-', 'bg-').replace('-500', '-100')} ${colorClass.replace('border-', 'text-').replace('-500', '-600')}`}>
                {icon}
              </div>
            </div>
            <div className="mt-1 text-3xl font-extrabold text-gray-900">
              {displayMaybeMasked(value, mask)}
            </div>
          </div>
        );

        // [NEW] ดึงวันที่ปัจจุบันมาแสดง
        const todayDateString = React.useMemo(() => formatThaiDate(), []);


        return (
          <div className="p-4 sm:p-6 bg-gray-50 min-h-screen">
            <Header title="🏠 Dashboard (หน้าหลัก)" />

            {/* [NEW] แสดงวันที่ปัจจุบัน */}
            <div className="mt-4 p-3 bg-white rounded-xl shadow-md text-left text-lg font-bold text-gray-700">
              <p>📅{todayDateString}</p>
            </div>

            {/* Daily Summary Cards */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
              <SummaryCard
                title="💰 ยอดขายรวมวันนี้"
                value={dailySummary.totalSale}
                colorClass="border-blue-500"
                icon={<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8V9m0 3v2m0 3a5 5 0 01-5 5H5a2 2 0 01-2-2v-5l1.45-1.45m17.1-5.74A2 2 0 0121 5H3a2 2 0 000 4h18a2 2 0 012 2v5a2 2 0 01-2 2h-2" /></svg>}
              />
              <SummaryCard
                title="💸 ต้นทุนรวมวันนี้"
                value={dailySummary.totalCost}
                colorClass="border-yellow-500"
                icon={<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>}
                mask={true} // กำไร = ข้อมูล sensitive
              />
              <SummaryCard
                title="📈 กำไรรวมวันนี้"
                value={dailySummary.totalSale - dailySummary.totalCost}
                colorClass="border-green-500"
                icon={<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>}
                mask={true} // กำไร = ข้อมูล sensitive
              />
            </div>

            {/* Today's Bills List */}
            <div className="mt-8">
              <h2 className="text-xl font-bold text-green-700 mb-4">รายการบิลของวันนี้ ({todayBills.length} บิล)</h2>
              <div className="space-y-3">
                {todayBills.length > 0 ? (
                  todayBills.map(bill => <BillCard key={bill.id} bill={bill} />)
                ) : (
                  <div className="bg-white p-6 rounded-xl shadow-md text-center text-gray-500">
                    วันนี้ยังไม่มีรายการบิล
                  </div>
                )}
              </div>
            </div>

            <FloatingActionButton onClick={() => navigateTo('addBill')} label="เพิ่มบิลใหม่" />
          </div>
        );
      };

      // --- 8. Product Manager View (เวอร์ชั่นเพิ่มระบบสต็อก) ---

      const ProductManagerView = () => {
        const [isEditing, setIsEditing] = useState(false);
        // เพิ่ม stock: 0 เข้าไปใน state เริ่มต้น
        const [currentProduct, setCurrentProduct] = useState({ id: null, name: '', price: '', cost: '', barcode: '', stock: 0 });
        const [filterText, setFilterText] = useState('');
        // เพิ่ม state สำหรับ pagination
        const [currentPage, setCurrentPage] = useState(1);
        const itemsPerPage = 25; // จำนวนรายการต่อหน้า

        // กรองสินค้าตามการค้นหา
        const filteredProducts = products.filter(p => {
          // 1. เตรียมคำค้นหา: ลบเว้นวรรคออกทั้งหมด และทำเป็นตัวพิมพ์เล็ก
          const cleanFilterText = filterText.replace(/\s+/g, '').toLowerCase();

          // 2. เตรียมชื่อสินค้า: ลบเว้นวรรคออกทั้งหมด และทำเป็นตัวพิมพ์เล็ก
          const cleanProductName = (p.name || '').replace(/\s+/g, '').toLowerCase();

          // 3. นำมาเปรียบเทียบกัน
          return cleanProductName.includes(cleanFilterText);
        });

        // คำนวณจำนวนหน้าทั้งหมด
        const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);

        // ดึงรายการสำหรับหน้าปัจจุบัน
        const currentProducts = useMemo(() => {
          const startIndex = (currentPage - 1) * itemsPerPage;
          return filteredProducts.slice(startIndex, startIndex + itemsPerPage);
        }, [filteredProducts, currentPage]);

        // ฟังก์ชันสำหรับจัดการการเปลี่ยนแปลงของช่องค้นหา
        const handleFilterChange = (e) => {
          // 1. ตั้งค่าข้อความค้นหาใหม่
          setFilterText(e.target.value);
          // 2. การแก้ไข: รีเซ็ตกลับไปหน้า 1 เสมอ
          setCurrentPage(1);
        };

        // เพิ่ม component Pagination
        const Pagination = () => {
          const maxPageButtons = 5;
          let startPage = Math.max(1, currentPage - Math.floor(maxPageButtons / 2));
          let endPage = Math.min(totalPages, startPage + maxPageButtons - 1);

          if (endPage - startPage + 1 < maxPageButtons) {
            startPage = Math.max(1, endPage - maxPageButtons + 1);
          }

          return (
            <div className="flex justify-center items-center space-x-2 mt-6 mb-6">
              {/* ปุ่มก่อนหน้า */}
              <button
                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                disabled={currentPage === 1}
                className="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:text-gray-400"
              >
                ←
              </button>

              {/* ปุ่มหน้าแรก */}
              {startPage > 1 && (
                <>
                  <button
                    onClick={() => setCurrentPage(1)}
                    className={`px-3 py-1 rounded-lg ${currentPage === 1 ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
                  >
                    1
                  </button>
                  {startPage > 2 && <span className="px-2">...</span>}
                </>
              )}

              {/* ปุ่มตัวเลขหน้า */}
              {Array.from({ length: endPage - startPage + 1 }, (_, i) => startPage + i).map(page => (
                <button
                  key={page}
                  onClick={() => setCurrentPage(page)}
                  className={`px-3 py-1 rounded-lg ${currentPage === page ? 'bg-green-500 text-white' : 'bg-gray-200 hover:bg-gray-300'}`}
                >
                  {page}
                </button>
              ))}

              {/* ปุ่มหน้าสุดท้าย */}
